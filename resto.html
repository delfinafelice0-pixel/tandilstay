<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gastronomía · TandilStay</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
.ff-display{font-family:'Fraunces',serif}.ff-body{font-family:'Hanken Grotesk',sans-serif}body{margin:0}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = "https://unzytiqqitdfkdnpcgyz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuenl0aXFxaXRkZmtkbnBjZ3l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njg4NjAsImV4cCI6MjA5NjQ0NDg2MH0.jdwNTU1WpjjadG2tyfvqf69YbkczL-CrSayHbPj70CM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const C = { paper:"#F3EEE2", ink:"#2C2A24", moss:"#3E4F3F", clay:"#BE6A4A" };
const A = C.clay;
const IMG = (p) => (!p ? "" : (String(p).startsWith("http") ? p : `https://images.unsplash.com/${p}?auto=format&fit=crop&w=1200&q=80`));
const money = (n) => "$" + Number(n||0).toLocaleString("es-AR");
const fromRow = (r) => ({ id:r.id, slug:r.slug, name:r.name, zone:r.zone||"", whatsapp:r.whatsapp||"", phone:r.phone||"", blurb:r.blurb||"", sinTacc:r.sin_tacc, vegetariano:r.vegetariano, reserva:r.reserva, comoReservar:r.como_reservar||"", menuUrl:r.menu_url||"", videos:r.videos||[], banner:r.banner||"", photos:r.photos||[], menu:r.menu||[] });
const ytEmbed = (url) => { const m=(url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/); return m?`https://www.youtube.com/embed/${m[1]}`:null; };

function Nearby({ acts=[], food=[], cabins=[] }) {
  const IMGc = (x) => IMG(x.banner || (x.photos && x.photos[0]));
  const Strip = ({ kicker, title, items, href, sub }) => (items && items.length>0) ? (
    <div className="mb-9">
      <p className="ff-body text-[11px] uppercase tracking-[0.25em] font-semibold mb-1" style={{color:C.clay}}>{kicker}</p>
      <h3 className="ff-display text-2xl mb-4" style={{color:C.ink}}>{title}</h3>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-4">
        {items.slice(0,4).map((x,i)=>(
          <a key={i} href={href(x)} className="block bg-white rounded-2xl border border-black/5 overflow-hidden hover:shadow-md transition">
            <div className="aspect-[16/11] bg-stone-200"><img src={IMGc(x)} className="w-full h-full object-cover" /></div>
            <div className="p-3"><h4 className="ff-display text-base leading-tight" style={{color:C.ink}}>{x.name}</h4>{sub(x) && <p className="ff-body text-xs text-stone-500 mt-0.5">{sub(x)}</p>}</div>
          </a>
        ))}
      </div>
    </div>
  ) : null;
  if((!acts||!acts.length) && (!food||!food.length) && (!cabins||!cabins.length)) return null;
  return (
    <section style={{background:C.paper}}>
      <div className="max-w-5xl mx-auto px-5 sm:px-6 py-12 border-t border-black/5">
        <h2 className="ff-display text-3xl mb-1" style={{color:C.ink}}>Para tu escapada en Tandil</h2>
        <p className="ff-body text-stone-500 mb-8">Lo mejor de la zona para completar tu salida.</p>
        <Strip kicker="Dónde quedarte" title="Hospedajes" items={cabins} href={x=>"cabana.html?slug="+x.slug} sub={x=>x.zone||""} />
        <Strip kicker="Qué hacer" title="Actividades" items={acts} href={x=>"actividad.html?slug="+x.slug} sub={x=>[x.category,x.duration].filter(Boolean).join(" · ")} />
        <Strip kicker="Dónde comer" title="Gastronomía" items={food} href={x=>"resto.html?slug="+x.slug} sub={x=>x.zone||""} />
      </div>
    </section>
  );
}

function Resto({ c, cabins=[], acts=[] }) {
  const cover = c.banner || c.photos[0] || "photo-1517248135467-4c7edcad34c4";
  const cats = [...new Set(c.menu.map(i=>i.category||"Menú"))];
  const wa = c.whatsapp ? `https://wa.me/${c.whatsapp}` : null;
  return (
    <div style={{background:C.paper}} className="ff-body">
      <div className="relative h-[52vh] min-h-[380px] overflow-hidden">
        <img src={IMG(cover)} className="absolute inset-0 w-full h-full object-cover" />
        <div className="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-black/30" />
        <a href="index.html" className="absolute top-6 left-6 ff-body text-white/80 text-sm">‹ TandilStay</a>
        <div className="relative h-full max-w-5xl mx-auto px-6 flex flex-col justify-end pb-10">
          {c.zone && <div className="text-white/85 ff-body text-sm mb-2">📍 {c.zone}</div>}
          <h1 className="ff-display text-4xl sm:text-6xl text-white leading-[0.95]">{c.name}</h1>
          <div className="flex items-center gap-2 mt-3 flex-wrap">
            {c.sinTacc && <span className="bg-white/90 rounded-full px-3 py-1 ff-body text-sm font-semibold" style={{color:C.moss}}>🌾 Sin TACC</span>}
            {c.vegetariano && <span className="bg-white/90 rounded-full px-3 py-1 ff-body text-sm font-semibold" style={{color:C.moss}}>🥗 Vegetariano</span>}
            <span className="bg-white/90 rounded-full px-3 py-1 ff-body text-sm font-semibold" style={{color:C.moss}}>{c.reserva?"📅 Con reserva":"🚶 Sin reserva"}</span>
          </div>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-6 py-10 space-y-10">
        {c.blurb && <p className="ff-body text-lg text-stone-600 leading-relaxed max-w-2xl">{c.blurb}</p>}

        {c.reserva && c.comoReservar && (
          <div className="rounded-2xl px-5 py-4 flex items-start gap-3" style={{background:"#fff", border:"1px solid rgba(0,0,0,0.06)"}}>
            <span className="text-xl">📅</span><div><div className="ff-display text-lg" style={{color:C.ink}}>Cómo reservar</div><p className="ff-body text-stone-600 text-sm mt-0.5">{c.comoReservar}</p></div>
          </div>
        )}

        {c.menu.length>0 && (
          <div>
            <h2 className="ff-display text-3xl mb-5" style={{color:C.ink}}>El menú</h2>
            {cats.map((cat,ci)=>(
              <div key={ci} className="mb-8">
                <h3 className="ff-display text-xl mb-4" style={{color:A}}>{cat}</h3>
                <div className="grid sm:grid-cols-2 gap-5">
                  {c.menu.filter(i=>(i.category||"Menú")===cat).map((it,i)=>(
                    <div key={i} className="flex gap-4 bg-white rounded-2xl border border-black/5 overflow-hidden">
                      {it.photo && <img src={IMG(it.photo)} className="w-28 h-28 object-cover shrink-0 bg-stone-200" />}
                      <div className="py-3 pr-3 flex-1">
                        <div className="flex justify-between items-start gap-2"><span className="ff-display text-lg leading-tight" style={{color:C.ink}}>{it.name}</span>{it.price>0 && <span className="ff-body font-bold whitespace-nowrap" style={{color:A}}>{money(it.price)}</span>}</div>
                        {it.desc && <p className="ff-body text-sm text-stone-500 mt-1">{it.desc}</p>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {c.menuUrl && <a href={c.menuUrl} target="_blank" rel="noreferrer" className="inline-block rounded-full px-6 py-3 ff-body font-semibold text-white" style={{background:C.moss}}>📋 Ver menú completo</a>}

        {c.videos.filter(Boolean).length>0 && (
          <div>
            <h2 className="ff-display text-3xl mb-4" style={{color:C.ink}}>Videos</h2>
            <div className="grid sm:grid-cols-2 gap-4">
              {c.videos.filter(Boolean).map((v,i)=>{ const yt=ytEmbed(v); return yt
                ? <iframe key={i} title={"v"+i} className="w-full aspect-video rounded-2xl border border-black/5" src={yt} allowFullScreen></iframe>
                : <a key={i} href={v} target="_blank" rel="noreferrer" className="rounded-2xl border border-black/5 bg-white p-4 ff-body" style={{color:C.ink}}>▶ Ver video</a>;
              })}
            </div>
          </div>
        )}

        {c.photos.length>0 && (
          <div><h2 className="ff-display text-3xl mb-4" style={{color:C.ink}}>Fotos</h2><div className="grid grid-cols-2 sm:grid-cols-3 gap-2">{c.photos.map((p,i)=><img key={i} src={IMG(p)} className="w-full aspect-square object-cover rounded-xl bg-stone-200" />)}</div></div>
        )}

        {c.zone && (
          <div><h2 className="ff-display text-3xl mb-4" style={{color:C.ink}}>Cómo llegar</h2><p className="ff-body text-stone-600 mb-3">📍 {c.zone}</p><iframe title="mapa" loading="lazy" className="w-full h-72 rounded-2xl border border-black/5" src={"https://www.google.com/maps?q="+encodeURIComponent(c.zone)+"&output=embed"}></iframe></div>
        )}

        <div className="flex flex-wrap gap-3">
          {wa && <a href={wa} target="_blank" rel="noreferrer" className="rounded-full px-6 py-3 ff-body font-semibold text-white" style={{background:A}}>💬 WhatsApp</a>}
          {c.phone && <a href={"tel:"+c.phone} className="rounded-full px-6 py-3 ff-body font-semibold border" style={{borderColor:C.moss,color:C.moss}}>📞 {c.phone}</a>}
        </div>
      </div>
      <Nearby cabins={cabins} acts={acts} />
      <footer className="py-8 text-center ff-body text-sm" style={{background:C.moss,color:"rgba(255,255,255,0.7)"}}>{c.name} · vía TandilStay · Creado por Brote 🌱</footer>
    </div>
  );
}

function App() {
  const [state,setState]=useState({loading:true});
  useEffect(()=>{
    const slug=new URLSearchParams(location.search).get("slug");
    (async()=>{
      if(slug){ const [r,cab,act]=await Promise.all([db.from("restaurants").select("*").eq("slug",slug).limit(1),db.from("cabins").select("slug,name,zone,price,banner,photos").order("created_at",{ascending:false}),db.from("activities").select("slug,name,category,duration,banner,photos").order("created_at",{ascending:false})]); if(r.error){setState({error:true});return;} if(r.data&&r.data[0]) setState({c:fromRow(r.data[0]),cabins:cab.data||[],acts:act.data||[]}); else setState({notfound:true}); }
      else { const {data}=await db.from("restaurants").select("slug,name,zone,banner,photos").order("created_at",{ascending:false}); setState({listing:data||[]}); }
    })();
  },[]);
  if(state.loading) return <div className="min-h-screen grid place-items-center ff-body" style={{background:C.paper,color:C.moss}}>Cargando…</div>;
  if(state.error) return <div className="min-h-screen grid place-items-center ff-body p-6 text-center" style={{background:C.paper,color:C.ink}}>Hubo un error. Recargá.</div>;
  if(state.notfound) return <div className="min-h-screen grid place-items-center ff-body p-6 text-center" style={{background:C.paper,color:C.ink}}>No encontramos ese lugar. <a href="resto.html" className="underline ml-1" style={{color:C.clay}}>Ver todos</a></div>;
  if(state.c) return <Resto c={state.c} cabins={state.cabins} acts={state.acts} />;
  return (
    <div className="min-h-screen ff-body" style={{background:C.paper}}>
      <div className="max-w-5xl mx-auto px-6 py-12">
        <h1 className="ff-display text-3xl mb-1" style={{color:C.ink}}>Dónde comer en Tandil</h1>
        <p className="ff-body text-stone-500 mb-6">Tocá un lugar para ver su menú.</p>
        {state.listing.length===0 ? <p className="ff-body text-stone-500">Todavía no hay lugares cargados.</p>
        : <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">{state.listing.map((c,i)=>(
            <a key={i} href={"resto.html?slug="+c.slug} className="block bg-white rounded-2xl border border-black/5 overflow-hidden">
              <div className="aspect-[16/10] bg-stone-200">{(c.banner||(c.photos&&c.photos[0])) && <img src={IMG(c.banner||c.photos[0])} className="w-full h-full object-cover" />}</div>
              <div className="p-4"><h3 className="ff-display text-lg" style={{color:C.ink}}>{c.name}</h3><p className="ff-body text-sm text-stone-500">{c.zone}</p></div>
            </a>
          ))}</div>}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
