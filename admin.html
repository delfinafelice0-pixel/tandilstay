<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin · TandilStay</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
.ff-display{font-family:'Fraunces',serif}.ff-body{font-family:'Hanken Grotesk',sans-serif}body{margin:0}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = "https://unzytiqqitdfkdnpcgyz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuenl0aXFxaXRkZmtkbnBjZ3l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njg4NjAsImV4cCI6MjA5NjQ0NDg2MH0.jdwNTU1WpjjadG2tyfvqf69YbkczL-CrSayHbPj70CM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const C = { paper:"#F3EEE2", ink:"#2C2A24", moss:"#3E4F3F", clay:"#BE6A4A" };
const ROLES = [["hospedaje","Hospedaje"],["gastronomia","Gastronomía"],["actividad","Actividad"],["admin","Admin"]];
const PANELS = { hospedaje:"panel.html", gastronomia:"gastro-panel.html", actividad:"act-panel.html" };

function App() {
  const [session,setSession]=useState(null), [ready,setReady]=useState(false), [me,setMe]=useState(null);
  const [email,setEmail]=useState(""), [pass,setPass]=useState(""), [authErr,setAuthErr]=useState("");
  const [tab,setTab]=useState("usuarios");
  const [profiles,setProfiles]=useState([]);
  const [nu,setNu]=useState({ email:"", password:"", role:"hospedaje", operator:"", max_listings:"1" });
  const [msg,setMsg]=useState(""); const [busy,setBusy]=useState(false);
  const [counts,setCounts]=useState({});

  useEffect(()=>{ db.auth.getSession().then(({data})=>{setSession(data.session);setReady(true);}); const {data:sub}=db.auth.onAuthStateChange((_e,s)=>setSession(s)); return ()=>sub.subscription.unsubscribe(); },[]);
  useEffect(()=>{ if(!session){ setMe(null); return; } (async()=>{ const {data}=await db.from("profiles").select("role,operator,email").eq("id",session.user.id).maybeSingle(); setMe(data||{role:"?"}); })(); },[session]);
  const loadProfiles = async()=>{ const {data}=await db.from("profiles").select("*").order("created_at",{ascending:false}); setProfiles(data||[]); };
  const loadCounts = async()=>{ const t=async(n)=>{ const {count}=await db.from(n).select("*",{count:"exact",head:true}); return count||0; }; setCounts({ cabins:await t("cabins"), restaurants:await t("restaurants"), activities:await t("activities") }); };
  useEffect(()=>{ if(me&&me.role==="admin"){ loadProfiles(); loadCounts(); } },[me]);

  const flash=(m)=>{ setMsg(m); setTimeout(()=>setMsg(""),3500); };
  const login=async()=>{ setAuthErr(""); const {error}=await db.auth.signInWithPassword({email,password:pass}); if(error) setAuthErr("No pudimos entrar."); };
  const crearUsuario=async()=>{
    if(!nu.email||!nu.password){ flash("Completá email y contraseña"); return; }
    setBusy(true);
    const body = { ...nu, max_listings: nu.max_listings===""?null:parseInt(nu.max_listings,10) };
    const { data, error } = await db.functions.invoke("super-action", { body });
    setBusy(false);
    if(error || (data&&data.error)){ flash("Error: "+((data&&data.error)||error.message)); return; }
    flash("Usuario creado ✓"); setNu({ email:"", password:"", role:"hospedaje", operator:"", max_listings:"1" }); loadProfiles();
  };
  const delUser=async(p)=>{
    if(session && p.id===session.user.id){ flash("No podés borrarte a vos misma"); return; }
    if(!confirm("¿Borrar a "+p.email+"? Pierde el acceso y se elimina su cuenta.")) return;
    setBusy(true);
    const { data, error } = await db.functions.invoke("super-action", { body:{ action:"delete", id:p.id } });
    setBusy(false);
    if(error || (data&&data.error)){ flash("Error: "+((data&&data.error)||error.message)); return; }
    flash("Usuario borrado ✓"); loadProfiles();
  };
  const updateProfile=async(id,patch)=>{ await db.from("profiles").update(patch).eq("id",id); loadProfiles(); };
  const billingStatus=(nd)=>{ if(!nd) return {label:"Sin pago",bg:"#ececec",fg:"#777"}; const t=new Date();t.setHours(0,0,0,0); const d=new Date(nd+"T00:00:00"); const days=Math.round((d-t)/86400000); if(days<0) return {label:"Vencido",bg:"#fde8e8",fg:"#b23b3b"}; if(days<=7) return {label:"Vence en "+days+"d",bg:"#fdf0d8",fg:"#9a6b1e"}; return {label:"Al día",bg:"#e7efe3",fg:C.moss}; };
  const fmtDate=(s)=> s ? new Date(s+"T00:00:00").toLocaleDateString("es-AR",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
  const todayISO=()=>new Date().toISOString().slice(0,10);
  const addMonthISO=(d)=>{ const x=new Date(d+"T00:00:00"); x.setMonth(x.getMonth()+1); return x.toISOString().slice(0,10); };
  const markPaid=(p)=>{ const lp=todayISO(); updateProfile(p.id,{last_paid:lp,next_due:addMonthISO(lp)}); };
  const copyUrl=(rel)=>{ try{ navigator.clipboard.writeText(new URL(rel,location.href).href); flash("Link copiado ✓"); }catch(e){ flash("No se pudo copiar"); } };

  if(!ready) return <div className="min-h-screen grid place-items-center ff-body" style={{background:C.paper,color:C.moss}}>Cargando…</div>;
  if(!session) return (
    <div className="min-h-screen grid place-items-center ff-body px-5" style={{background:C.paper}}>
      <div className="w-full max-w-sm bg-white rounded-2xl border border-black/5 p-7">
        <div className="text-center mb-5"><div className="text-3xl">🛠️</div><h1 className="ff-display text-2xl mt-1" style={{color:C.ink}}>Admin TandilStay</h1></div>
        <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="Email" className="w-full border border-stone-300 rounded-xl px-3 py-2.5 ff-body text-sm mb-2" />
        <input value={pass} onChange={e=>setPass(e.target.value)} type="password" placeholder="Contraseña" onKeyDown={e=>{if(e.key==="Enter")login();}} className="w-full border border-stone-300 rounded-xl px-3 py-2.5 ff-body text-sm mb-3" />
        {authErr && <p className="ff-body text-sm text-rose-600 mb-3">{authErr}</p>}
        <button onClick={login} className="w-full text-white rounded-xl py-3 ff-body font-semibold" style={{background:C.moss}}>Entrar</button>
      </div>
    </div>
  );
  if(me && me.role!=="admin") return (
    <div className="min-h-screen grid place-items-center ff-body px-5 text-center" style={{background:C.paper,color:C.ink}}>
      <div><p className="ff-display text-2xl mb-2">No autorizado</p><p className="ff-body text-stone-500 mb-4">Esta cuenta no es admin.</p><button onClick={()=>db.auth.signOut()} className="rounded-full px-4 py-2 ff-body text-sm border border-stone-300">Salir</button></div>
    </div>
  );

  return (
    <div className="min-h-screen ff-body" style={{background:C.paper}}>
      <header className="sticky top-0 z-30 border-b border-black/5" style={{background:C.paper}}>
        <div className="max-w-5xl mx-auto px-5 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2.5"><div className="w-9 h-9 rounded-xl grid place-items-center text-xl" style={{background:C.moss}}>🛠️</div><div><div className="ff-display text-lg leading-none" style={{color:C.ink}}>Admin maestro</div><div className="ff-body text-[11px] text-stone-500">TandilStay</div></div></div>
          <div className="flex items-center gap-2">
            <div className="flex rounded-full border border-stone-300 overflow-hidden">
              <button onClick={()=>setTab("usuarios")} className={"px-3.5 py-2 ff-body text-sm "+(tab==="usuarios"?"text-white":"text-stone-600")} style={tab==="usuarios"?{background:C.moss}:{}}>Usuarios</button>
              <button onClick={()=>setTab("resumen")} className={"px-3.5 py-2 ff-body text-sm "+(tab==="resumen"?"text-white":"text-stone-600")} style={tab==="resumen"?{background:C.moss}:{}}>Resumen</button>
            </div>
            <button onClick={()=>db.auth.signOut()} className="rounded-full px-3 py-2 ff-body text-sm border border-stone-300 text-stone-600">Salir</button>
          </div>
        </div>
        {msg && <div className="text-center ff-body text-xs py-1" style={{background:"#e7efe3",color:C.moss}}>{msg}</div>}
      </header>

      <div className="max-w-5xl mx-auto px-5 py-6">
        {tab==="usuarios" ? (
          <div className="grid md:grid-cols-2 gap-6">
            <div className="bg-white rounded-2xl border border-black/5 p-5 h-fit">
              <h3 className="ff-display text-lg mb-3" style={{color:C.ink}}>Crear usuario</h3>
              <input value={nu.email} onChange={e=>setNu({...nu,email:e.target.value})} placeholder="Email" className="w-full border border-stone-300 rounded-xl px-3 py-2 ff-body text-sm mb-2" />
              <input value={nu.password} onChange={e=>setNu({...nu,password:e.target.value})} placeholder="Contraseña" className="w-full border border-stone-300 rounded-xl px-3 py-2 ff-body text-sm mb-2" />
              <select value={nu.role} onChange={e=>setNu({...nu,role:e.target.value})} className="w-full border border-stone-300 rounded-xl px-3 py-2 ff-body text-sm mb-2 bg-white">{ROLES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
              <input value={nu.operator} onChange={e=>setNu({...nu,operator:e.target.value})} placeholder="Operador (ej: hospedatentandil)" className="w-full border border-stone-300 rounded-xl px-3 py-2 ff-body text-sm mb-2" />
              <input value={nu.max_listings} onChange={e=>setNu({...nu,max_listings:e.target.value.replace(/[^0-9]/g,"")})} placeholder="¿Cuántas publicaciones puede cargar? (vacío = sin tope)" className="w-full border border-stone-300 rounded-xl px-3 py-2 ff-body text-sm mb-3" />
              <button onClick={crearUsuario} disabled={busy} className="w-full text-white rounded-xl py-2.5 ff-body font-semibold disabled:opacity-50" style={{background:C.clay}}>{busy?"Creando…":"Crear usuario"}</button>
              <p className="ff-body text-xs text-stone-400 mt-2">El usuario entra a su panel según su rol con ese email y contraseña.</p>
            </div>
            <div className="bg-white rounded-2xl border border-black/5 p-5">
              <h3 className="ff-display text-lg mb-3" style={{color:C.ink}}>Usuarios ({profiles.length})</h3>
              <div className="space-y-3">
                {profiles.map(p=>{
                  const rubro = p.role && p.role!=="admin" ? p.role : null;
                  const landing = p.operator ? ("operador.html?op="+encodeURIComponent(p.operator)+(rubro?("&rubro="+rubro):"")) : null;
                  const panelHref = PANELS[p.role] || null;
                  const st = billingStatus(p.next_due);
                  const initial = (p.operator||p.email||"?").trim().charAt(0).toUpperCase();
                  const isMe = session && p.id===session.user.id;
                  return (
                  <div key={p.id} className="border border-stone-200 rounded-xl p-3.5">
                    <div className="flex items-center gap-2.5">
                      {p.logo ? <img src={p.logo} className="w-9 h-9 rounded-full object-cover shrink-0" /> : <div className="w-9 h-9 rounded-full grid place-items-center text-white ff-display text-sm shrink-0" style={{background:C.moss}}>{initial}</div>}
                      <div className="min-w-0 flex-1">
                        <div className="ff-body text-sm font-semibold truncate" style={{color:C.ink}}>{p.operator||"(sin operador)"}</div>
                        <div className="ff-body text-xs text-stone-500 truncate">{p.email}</div>
                      </div>
                      <span className="ff-body text-[11px] rounded-full px-2 py-0.5 shrink-0" style={{background:st.bg,color:st.fg}}>{st.label}</span>
                    </div>

                    <div className="flex gap-2 mt-3">
                      <select value={p.role||"hospedaje"} onChange={e=>updateProfile(p.id,{role:e.target.value})} className="border border-stone-300 rounded-lg px-2 py-1.5 ff-body text-sm bg-white">{ROLES.map(([v,l])=><option key={v} value={v}>{l}</option>)}</select>
                      <input defaultValue={p.operator||""} onBlur={e=>updateProfile(p.id,{operator:e.target.value})} placeholder="operador" className="flex-1 min-w-0 border border-stone-300 rounded-lg px-2 py-1.5 ff-body text-sm" />
                      <div className="flex items-center gap-1.5 shrink-0">
                        <span className="ff-body text-xs text-stone-500">Pub.</span>
                        <input defaultValue={p.max_listings??""} onBlur={e=>updateProfile(p.id,{max_listings:e.target.value===""?null:parseInt(e.target.value,10)})} placeholder="∞" className="w-12 border border-stone-300 rounded-lg px-2 py-1.5 ff-body text-sm" />
                      </div>
                    </div>

                    {landing && (
                      <div className="flex items-center gap-1.5 mt-2.5 bg-stone-50 rounded-lg px-2 py-1.5">
                        <span className="ff-body text-xs text-stone-500 shrink-0">🔗</span>
                        <span className="ff-body text-xs truncate flex-1" style={{color:C.ink}}>{landing}</span>
                        <button onClick={()=>copyUrl(landing)} className="rounded-md px-2 py-1 ff-body text-xs border border-stone-300 text-stone-600 shrink-0">Copiar</button>
                        <a href={landing} target="_blank" rel="noreferrer" className="rounded-md px-2 py-1 ff-body text-xs text-white shrink-0" style={{background:C.clay}}>Abrir front</a>
                      </div>
                    )}

                    <div className="flex flex-wrap items-end gap-x-3 gap-y-2 mt-2.5">
                      <div>
                        <div className="ff-body text-[11px] text-stone-500 mb-0.5">Último pago</div>
                        <input key={"lp"+(p.last_paid||"")} type="date" defaultValue={p.last_paid||""} onBlur={e=>updateProfile(p.id,{last_paid:e.target.value||null})} className="border border-stone-300 rounded-lg px-2 py-1.5 ff-body text-sm" />
                      </div>
                      <div>
                        <div className="ff-body text-[11px] text-stone-500 mb-0.5">Próximo pago</div>
                        <input key={"nd"+(p.next_due||"")} type="date" defaultValue={p.next_due||""} onBlur={e=>updateProfile(p.id,{next_due:e.target.value||null})} className="border border-stone-300 rounded-lg px-2 py-1.5 ff-body text-sm" />
                      </div>
                      <button onClick={()=>markPaid(p)} className="rounded-lg px-3 py-1.5 ff-body text-xs font-semibold text-white" style={{background:C.moss}}>✓ Pagó hoy</button>
                    </div>

                    <div className="flex items-center gap-3 mt-3">
                      {panelHref && <a href={panelHref} target="_blank" rel="noreferrer" className="ff-body text-xs" style={{color:C.clay}}>Abrir su panel →</a>}
                      {!isMe && <button onClick={()=>delUser(p)} disabled={busy} className="ml-auto rounded-lg px-3 py-1.5 ff-body text-sm border border-rose-200 text-rose-600 disabled:opacity-50">🗑️ Borrar</button>}
                    </div>
                  </div>
                  );
                })}
              </div>
            </div>
          </div>
        ) : (
          <div className="space-y-6">
            <div className="grid sm:grid-cols-3 gap-4">
              {[["Hospedajes",counts.cabins,"panel.html"],["Gastronomía",counts.restaurants,"gastro-panel.html"],["Actividades",counts.activities,"act-panel.html"]].map(([l,n,href],i)=>(
                <a key={i} href={href} className="bg-white rounded-2xl border border-black/5 p-6 block">
                  <div className="ff-display text-3xl" style={{color:C.ink}}>{n??"…"}</div>
                  <div className="ff-body text-stone-500">{l}</div>
                  <div className="ff-body text-sm mt-3" style={{color:C.clay}}>Abrir panel →</div>
                </a>
              ))}
            </div>

            {(()=>{
              const sortedByDue=[...profiles].filter(p=>p.role!=="admin").sort((a,b)=>{
                if(!a.next_due&&!b.next_due) return 0;
                if(!a.next_due) return 1;
                if(!b.next_due) return -1;
                return a.next_due<b.next_due?-1:a.next_due>b.next_due?1:0;
              });
              return (
              <div className="bg-white rounded-2xl border border-black/5 p-5">
                <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
                  <h3 className="ff-display text-lg" style={{color:C.ink}}>Cobros · vencimientos</h3>
                  <span className="ff-body text-xs text-stone-500">{sortedByDue.length} operadores · el próximo a vencer va primero</span>
                </div>
                <div className="overflow-x-auto -mx-2 px-2">
                  <table className="w-full ff-body text-sm border-collapse">
                    <thead>
                      <tr className="text-left text-stone-400 ff-body text-[11px] uppercase tracking-wide">
                        <th className="py-2 pr-3 font-semibold">Operador</th>
                        <th className="py-2 px-3 font-semibold">Rubro</th>
                        <th className="py-2 px-3 font-semibold whitespace-nowrap">Último pago</th>
                        <th className="py-2 px-3 font-semibold">Vence</th>
                        <th className="py-2 px-3 font-semibold">Estado</th>
                        <th className="py-2 pl-3 font-semibold text-right">Acción</th>
                      </tr>
                    </thead>
                    <tbody>
                      {sortedByDue.length===0 && <tr><td colSpan="6" className="py-6 text-center text-stone-400">Todavía no hay operadores cargados.</td></tr>}
                      {sortedByDue.map((p,idx)=>{
                        const st=billingStatus(p.next_due);
                        const rubroLabel=(ROLES.find(r=>r[0]===p.role)||[null,"—"])[1];
                        const initial=(p.operator||p.email||"?").trim().charAt(0).toUpperCase();
                        const top=idx===0 && !!p.next_due;
                        return (
                        <tr key={p.id} className="border-t border-stone-100" style={top?{background:"#fbf6ec"}:{}}>
                          <td className="py-2.5 pr-3">
                            <div className="flex items-center gap-2">
                              {p.logo ? <img src={p.logo} className="w-7 h-7 rounded-full object-cover shrink-0" /> : <div className="w-7 h-7 rounded-full grid place-items-center text-white ff-display text-xs shrink-0" style={{background:C.moss}}>{initial}</div>}
                              <div className="min-w-0">
                                <div className="font-semibold truncate" style={{color:C.ink}}>{p.operator||"(sin operador)"}{top && <span className="ml-1.5 text-[10px] font-semibold" style={{color:C.clay}}>⏰ próximo</span>}</div>
                                <div className="text-[11px] text-stone-400 truncate">{p.email}</div>
                              </div>
                            </div>
                          </td>
                          <td className="py-2.5 px-3 text-stone-600 whitespace-nowrap">{rubroLabel}</td>
                          <td className="py-2.5 px-3 text-stone-600 whitespace-nowrap">{fmtDate(p.last_paid)}</td>
                          <td className="py-2.5 px-3 whitespace-nowrap font-semibold" style={{color:C.ink}}>{fmtDate(p.next_due)}</td>
                          <td className="py-2.5 px-3 whitespace-nowrap"><span className="ff-body text-[11px] rounded-full px-2 py-0.5" style={{background:st.bg,color:st.fg}}>{st.label}</span></td>
                          <td className="py-2.5 pl-3 text-right whitespace-nowrap"><button onClick={()=>markPaid(p)} className="rounded-lg px-2.5 py-1 ff-body text-xs font-semibold text-white" style={{background:C.moss}}>✓ Pagó hoy</button></td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
              );
            })()}
          </div>
        )}
      </div>
      <footer className="py-8 text-center ff-body text-sm" style={{background:C.moss,color:"rgba(255,255,255,0.7)"}}>Admin · TandilStay · Creado por Brote 🌱</footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
