<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = "https://unzytiqqitdfkdnpcgyz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuenl0aXFxaXRkZmtkbnBjZ3l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njg4NjAsImV4cCI6MjA5NjQ0NDg2MH0.jdwNTU1WpjjadG2tyfvqf69YbkczL-CrSayHbPj70CM";

const C = { paper:"#F3EEE2", cream:"#FBF7EF", mist:"#E7E1D3", ink:"#24221C", moss:"#3E4F3F", mossdeep:"#2C3A2C", sage:"#7C8F6F", clay:"#BE6A4A", sun:"#E2A94E" };

const igEmbed = (url) => { const m=(url||"").match(/instagram\.com\/(reel|reels|p|tv)\/([\w-]+)/); return m?`https://www.instagram.com/${m[1]==="reels"?"reel":m[1]}/${m[2]}/`:null; };
const ytId = (url) => { const m=(url||"").match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/); return m?m[1]:null; };
const money = (n) => "$" + Number(n||0).toLocaleString("es-AR");
const kFmt = (n) => (n >= 1000 ? Math.round(n/1000)+"k" : ""+n);
const pad = (n) => String(n).padStart(2,"0");
const iso = (dt) => `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`;
const parseD = (s) => (s ? new Date(s+"T00:00:00") : null);

const DOW = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const MONTHS = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];

const fromRow = (r) => ({ id:r.id, slug:r.slug, name:r.name, zone:r.zone||"", whatsapp:r.whatsapp||"", blurb:r.blurb||"", capacity:r.capacity, bedrooms:r.bedrooms, bathrooms:r.bathrooms, price:r.price, weekendPrice:r.weekend_price, amenities:r.amenities||[], petFriendly:r.pet_friendly, promoText:r.promo_text||"", promos:r.promos||[], blocked:[...new Set([...(r.blocked||[]), ...(r.ical_blocked||[])])], overrides:r.overrides||{}, units:r.units||[], videos:r.videos||[], banner:r.banner||"", photos:r.photos||[], minNights:r.min_nights||1, type:r.type||"" });
const nightlyPrice = (c,d) => (c.overrides && c.overrides[d]!=null ? c.overrides[d] : (isWeekend(d) && c.weekendPrice ? c.weekendPrice : c.price));
function computeStay(c,ci,co){ if(!ci||!co) return null; let d=parseD(ci); const e=parseD(co); let sub=0,n=0; while(d<e){ sub+=nightlyPrice(c,iso(d)); n++; d=addDay(d); } let pct=0; (c.promos||[]).forEach(p=>{if(n>=p.min&&p.pct>pct)pct=p.pct;}); const disc=Math.round(sub*pct/100); return {n,sub,pct,disc,total:sub-disc}; }
const isAvail = (c,ci,co) => { if(!ci||!co) return true; let d=parseD(ci); const e=parseD(co); while(d<e){ if(c.blocked.includes(iso(d))) return false; d=addDay(d); } return true; };
const capLabel = (c) => { const caps=(c.units||[]).map(u=>u.capacity).filter(Boolean); if(!caps.length) return `hasta ${c.capacity} huéspedes`; const mn=Math.min(...caps), mx=Math.max(...caps); return mn===mx?`hasta ${mx} huéspedes`:`${mn} a ${mx} huéspedes`; };

function Calendar({ cursor, setCursor, blocked, ci, co, onDay, priceOf }) {
  const y=cursor.getFullYear(), m=cursor.getMonth();
  const startDow=new Date(y,m,1).getDay();
  const dim=new Date(y,m+1,0).getDate();
  const cells=[]; for(let i=0;i<startDow;i++) cells.push(null); for(let d=1;d<=dim;d++) cells.push(d);
  const canPrev = new Date(y,m,1) > new Date(TODAY.getFullYear(), TODAY.getMonth(), 1);
  return (
    <div className="select-none">
      <div className="flex items-center justify-between mb-3">
        <button disabled={!canPrev} onClick={()=>setCursor(new Date(y,m-1,1))} className="px-2 py-1 rounded-lg hover:bg-black/5 disabled:opacity-30">‹</button>
        <span className="ff-display text-lg" style={{color:C.ink}}>{MONTHS[m]} {y}</span>
        <button onClick={()=>setCursor(new Date(y,m+1,1))} className="px-2 py-1 rounded-lg hover:bg-black/5">›</button>
      </div>
      <div className="grid grid-cols-7 gap-1 text-center mb-1">{DOW.map(d=><div key={d} className="ff-body text-[11px] font-semibold text-stone-400">{d}</div>)}</div>
      <div className="grid grid-cols-7 gap-1">
        {cells.map((d,i)=>{
          if(!d) return <div key={i} />;
          const day=`${y}-${pad(m+1)}-${pad(d)}`;
          const past=parseD(day)<TODAY;
          const isBlocked=blocked.includes(day);
          const inRange=ci&&co&&day>=ci&&day<co;
          const isStart=day===ci;
          let cls="ff-body rounded-lg h-12 flex flex-col items-center justify-center transition text-sm ";
          let style={};
          if(past) cls+="text-stone-300 line-through cursor-not-allowed";
          else if(isBlocked) cls+="bg-rose-50 text-rose-300 line-through cursor-not-allowed";
          else if(isStart||inRange){ cls+="text-white cursor-pointer"; style={background:A}; }
          else cls+="text-stone-700 cursor-pointer hover:bg-black/5";
          return <button key={i} className={cls} style={style} disabled={past||isBlocked} onClick={()=>onDay(day,{past,isBlocked})}><span>{d}</span>{!past && <span className={"text-[9px] leading-none mt-0.5 "+((isStart||inRange)?"text-white/80":"text-stone-400")}>{kFmt(priceOf(day))}</span>}</button>;
        })}
      </div>
    </div>
  );
}

function SiteHeader() {

}

function Landing({ c, acts=[], food=[] }) {
  const [q,setQ]=useState({ci:"",co:""});
  const [main,setMain]=useState(0);
  const [cursor,setCursor]=useState(new Date(2026,5,1));
  const [openUnit,setOpenUnit]=useState(null);
  const stay=computeStay(c,q.ci,q.co);
  const avail=isAvail(c,q.ci,q.co);
  const pick=(day,info)=>{ if(info.past||info.isBlocked) return; if(!q.ci||(q.ci&&q.co)){setQ({ci:day,co:""});return;} if(day<=q.ci){setQ({ci:day,co:""});return;} let d=parseD(q.ci),ok=true; while(d<parseD(day)){if(c.blocked.includes(iso(d))){ok=false;break;}d=addDay(d);} setQ(ok?{ci:q.ci,co:day}:{ci:day,co:""}); };
  let msg=`Hola! Quiero consultar por ${c.name}.`; if(q.ci&&q.co) msg+=` Del ${q.ci} al ${q.co}.`; if(stay&&avail) msg+=` Total estimado ${money(stay.total)}.`;
  const wa=`https://wa.me/${c.whatsapp}?text=${encodeURIComponent(msg)}`;
  const photos = c.photos.length ? c.photos : ["photo-1518780664697-55e3ad937233"];
  const cover = c.banner || photos[0];
  return (
    <div style={{background:C.paper}}>

        <div className="relative h-full max-w-6xl mx-auto px-5 sm:px-6 flex flex-col justify-end pb-12">
          {c.zone && <div className="kick text-white/85 mb-3">📍 {c.zone}</div>}
          <h1 className="ff-display text-4xl sm:text-6xl text-white leading-[1.02]" style={{fontWeight:300, letterSpacing:"-0.01em"}}>{c.name}</h1>
          <div className="flex items-center gap-4 mt-5 flex-wrap">
            <a href={wa} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full px-7 py-3 ff-body font-semibold transition-transform duration-500 hover:-translate-y-0.5" style={{background:C.cream, color:C.ink}}>Reservar por WhatsApp</a>
            <span className="ff-body text-white/85 text-sm">{capLabel(c)}{c.petFriendly?" · 🐾 pet friendly":""}</span>
          </div>
        </div>
      </div>

      {c.promoText && (
        <div className="max-w-5xl mx-auto px-6 mt-6">
          <div className="rounded-2xl px-5 py-4 flex items-start gap-3 text-white" style={{background:A}}>
            <span className="text-lg">🏷️</span>
            <div><div className="ff-body font-semibold">{c.promoText}</div>{c.promos.length>0 && <div className="ff-body text-sm text-white/80 mt-0.5">{c.promos.map(p=>`${p.min}+ noches −${p.pct}%`).join(" · ")}</div>}</div>
          </div>
        </div>
      )}

      <div className="max-w-5xl mx-auto px-6 py-10 grid md:grid-cols-3 gap-8">
        <div className="md:col-span-2 space-y-8">
          {c.blurb && <div><h2 className="ff-display text-2xl mb-2" style={{color:C.ink}}>Sobre el lugar</h2><p className="ff-body text-stone-600 leading-relaxed">{c.blurb}</p></div>}
          {c.photos.length>0 && <div><h2 className="ff-display text-2xl mb-3" style={{color:C.ink}}>Galería</h2><div className="grid grid-cols-2 sm:grid-cols-3 gap-2">{c.photos.map((p,i)=><img key={i} src={IMG(p)} className="lb-img cursor-zoom-in w-full aspect-square object-cover rounded-xl bg-stone-200" />)}</div></div>}
          {(c.videos||[]).filter(Boolean).length>0 && <div><h2 className="ff-display text-2xl mb-3" style={{color:C.ink}}>Videos</h2><div className="grid sm:grid-cols-2 gap-4">{c.videos.filter(Boolean).map((v,i)=>{ const yt=ytEmbed(v); if(yt) return <iframe key={i} title={"v"+i} className="w-full aspect-video rounded-2xl border border-black/5" src={yt} allowFullScreen></iframe>; const ig=igEmbed(v); if(ig) return <blockquote key={i} className="instagram-media" data-instgrm-permalink={ig} data-instgrm-version="14" style={{margin:0,width:"100%",minWidth:0,background:"#fff",borderRadius:16}}></blockquote>; return <a key={i} href={v} target="_blank" rel="noreferrer" className="rounded-2xl border border-black/5 bg-white p-4 ff-body" style={{color:C.ink}}>▶ Ver video</a>; })}</div></div>}

            <div onClick={()=>setOpenUnit(null)} className="fixed inset-0 z-50 bg-black/70 flex items-start justify-center p-4 overflow-y-auto">
              <div onClick={e=>e.stopPropagation()} className="bg-white rounded-2xl max-w-lg w-full overflow-hidden my-8">
                <div className="flex items-center justify-between px-5 py-3 border-b border-black/5">
                  <span className="ff-display text-xl" style={{color:C.ink}}>{c.units[openUnit].name||("Cabaña "+(openUnit+1))}</span>
                  <button onClick={()=>setOpenUnit(null)} aria-label="Cerrar" className="text-stone-400 hover:text-stone-700 text-2xl leading-none">✕</button>
                </div>
                <div className="p-4 space-y-3">
                  {c.units[openUnit].photo && <img src={IMG(c.units[openUnit].photo)} alt="" className="w-full rounded-xl object-cover bg-stone-200" />}
                  {(()=>{ const u=c.units[openUnit]; if(!u.video) return null; const uyt=ytEmbed(u.video); const uig=igEmbed(u.video); return uyt
                    ? <iframe title="uvid" className="w-full aspect-video rounded-xl border-0" src={uyt} allowFullScreen></iframe>
                    : uig
                      ? <blockquote className="instagram-media" data-instgrm-permalink={uig} data-instgrm-version="14" style={{margin:0,width:"100%",minWidth:0}}></blockquote>
                      : <a href={u.video} target="_blank" rel="noreferrer" className="block text-center py-2 ff-body" style={{color:C.clay}}>▶ Ver video</a>; })()}
                  <div className="ff-body text-sm text-stone-500">👥 hasta {c.units[openUnit].capacity}</div>
                </div>
              </div>
            </div>
          )}
          {(c.amenities.length>0 || c.petFriendly || (c.minNights>1) || c.type) && (
            <div><h2 className="ff-display text-2xl mb-3" style={{color:C.ink}}>Comodidades</h2><div className="grid grid-cols-2 gap-3">
              {c.type && <div className="ff-body text-stone-700">🏠 {c.type}</div>}
              {c.minNights>1 && <div className="ff-body text-stone-700">🌙 Mínimo {c.minNights} noches</div>}
              {c.petFriendly && <div className="ff-body text-stone-700">🐾 Pet friendly</div>}
              {c.amenities.map(a=><div key={a} className="ff-body text-stone-700">{AMEN[a]}</div>)}
            </div></div>
          )}
          {c.zone && (
            <div>
              <h2 className="ff-display text-2xl mb-3" style={{color:C.ink}}>Cómo llegar</h2>
              <p className="ff-body text-stone-600 mb-3">📍 {c.zone}</p>
              <iframe title="mapa" loading="lazy" className="w-full h-72 rounded-2xl border border-black/5" src={"https://www.google.com/maps?q="+encodeURIComponent(c.zone)+"&output=embed"}></iframe>
            </div>
          )}
          <div id="calendario" style={{scrollMarginTop:"84px"}}>
            <h2 className="ff-display text-2xl mb-1" style={{color:C.ink}}>Disponibilidad y precios</h2>
            <p className="ff-body text-sm text-stone-500 mb-3">Cada día muestra su tarifa. Tocá entrada y salida.</p>
            <div className="border border-black/10 rounded-2xl p-4 max-w-sm bg-white"><Calendar cursor={cursor} setCursor={setCursor} blocked={c.blocked} ci={q.ci} co={q.co} priceOf={(d)=>nightlyPrice(c,d)} onDay={pick} /></div>
          </div>
        </div>
        <div className="md:col-span-1">
          <div className="sticky top-4 bg-white border border-black/10 rounded-2xl p-5 shadow-lg">
            <div className="ff-display text-2xl mb-1" style={{color:C.ink}}>desde {money(c.price)} <span className="ff-body text-stone-500 text-sm">/ noche</span></div>
            {c.weekendPrice && <p className="ff-body text-xs text-stone-500 mb-3">Finde: {money(c.weekendPrice)} / noche</p>}
            <div onClick={()=>{const el=document.getElementById("calendario"); if(el) el.scrollIntoView({behavior:"smooth"});}} title="Elegí las fechas en el calendario" className="grid grid-cols-2 rounded-xl border border-stone-300 overflow-hidden mb-3 ff-body text-sm cursor-pointer hover:border-stone-400 transition">
              <div className="p-3 border-r border-stone-300"><div className="text-[10px] uppercase text-stone-400 font-semibold">Entrada</div><div style={{color:C.ink}}>{q.ci||"—"}</div></div>
              <div className="p-3"><div className="text-[10px] uppercase text-stone-400 font-semibold">Salida</div><div style={{color:C.ink}}>{q.co||"—"}</div></div>
            </div>
            {stay ? (avail ? (
              <div>
                <div className="ff-body text-sm text-stone-600 space-y-1.5 mb-3">
                  <div className="flex justify-between"><span>{stay.n} noches</span><span>{money(stay.sub)}</span></div>
                  {stay.pct>0 && <div className="flex justify-between font-semibold" style={{color:A}}><span>Promo −{stay.pct}%</span><span>−{money(stay.disc)}</span></div>}
                </div>
                <div className="flex justify-between ff-body font-bold border-t border-stone-200 pt-3 mb-4" style={{color:C.ink}}><span>Total</span><span>{money(stay.total)}</span></div>
              </div>
            ) : <div className="bg-rose-50 text-rose-700 ff-body text-sm rounded-xl p-3 mb-4">No disponible en esas fechas.</div>)
            : <p className="ff-body text-sm text-stone-400 mb-4">Elegí fechas en el calendario.</p>}
            <a href={wa} target="_blank" rel="noreferrer" className="block text-center w-full text-white rounded-xl py-3 ff-body font-semibold" style={{background:A}}>💬 Reservar por WhatsApp</a>
          </div>
        </div>
      </div>
      <Nearby acts={acts} food={food} />
      <footer className="text-center ff-body text-sm" style={{background:C.mossdeep,color:"rgba(255,255,255,0.6)"}}>
        <div className="max-w-6xl mx-auto px-6 py-10">
          <div className="ff-display text-xl text-white mb-2">Visitando Tandil</div>
          <div>{c.name} · Creado por <a href="https://www.instagram.com/co.makers_/" target="_blank" rel="noopener noreferrer" style={{color:"inherit",textDecoration:"underline"}}>comaker</a></div>
        </div>
      </footer>
    </div>
  );
}

function App() {
  const [state,setState]=useState({ loading:true });
  useEffect(()=>{
    const slug = new URLSearchParams(location.search).get("slug");
    (async()=>{
      if(slug){
        const [cab, act, res] = await Promise.all([
          db.from("cabins").select("*").eq("slug", slug).limit(1),
          db.from("activities").select("slug,name,category,duration,banner,photos").order("created_at",{ascending:false}),
          db.from("restaurants").select("slug,name,zone,banner,photos").order("created_at",{ascending:false}),
        ]);
        if(cab.error){ setState({error:true}); return; }
        if(cab.data && cab.data[0]) setState({ cabin: fromRow(cab.data[0]), acts: act.data||[], food: res.data||[] }); else setState({ notfound:true });
        db.rpc("bump_view",{ p_rubro:"hospedaje", p_slug:slug }).then(()=>{});
      } else {
        const { data } = await db.from("cabins").select("slug,name,zone,price,photos").order("created_at",{ascending:false});
        setState({ listing: data||[] });
      }
    })();
  },[]);

  if(state.loading) return <div className="min-h-screen grid place-items-center ff-body" style={{background:C.paper,color:C.moss}}>Cargando…</div>;
  if(state.error) return <div className="min-h-screen grid place-items-center ff-body p-6 text-center" style={{background:C.paper,color:C.ink}}>Hubo un error al cargar. Recargá la página.</div>;
  if(state.notfound) return <div className="min-h-screen grid place-items-center ff-body p-6 text-center" style={{background:C.paper,color:C.ink}}>No encontramos esa cabaña. <a href="cabana.html" className="underline ml-1" style={{color:C.clay}}>Ver todas</a></div>;
  if(state.cabin) return <div className="ff-body"><Landing c={state.cabin} acts={state.acts} food={state.food} /></div>;

  return (
    <div className="min-h-screen ff-body" style={{background:C.paper}}>
      <div className="max-w-5xl mx-auto px-6 py-12">
        <h1 className="ff-display text-3xl mb-1" style={{color:C.ink}}>Elegí un alojamiento</h1>
        <p className="ff-body text-stone-500 mb-6">Tocá una cabaña para ver su landing.</p>
        {state.listing.length===0 ? (
          <p className="ff-body text-stone-500">Todavía no hay alojamientos cargados. Cargá uno en el panel.</p>
        ) : (
          <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-5">
            {state.listing.map((c,i)=>(
              <a key={i} href={"cabana.html?slug="+c.slug} className="block bg-white rounded-2xl border border-black/5 overflow-hidden">
                <div className="aspect-[16/10] bg-stone-200">{c.photos && c.photos[0] && <img src={IMG(c.photos[0])} className="w-full h-full object-cover" />}</div>
                <div className="p-4"><h3 className="ff-display text-lg" style={{color:C.ink}}>{c.name}</h3><p className="ff-body text-sm text-stone-500">{c.zone}</p><p className="ff-body text-sm mt-1" style={{color:C.ink}}><span className="font-bold">{money(c.price)}</span> / noche</p></div>
              </a>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script>
(function(){
  function setup(){
    if(!('IntersectionObserver' in window)){document.querySelectorAll('.reveal').forEach(function(e){e.classList.add('in')});return;}
    var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}})},{threshold:0.12,rootMargin:'0px 0px -6% 0px'});
    function scan(){document.querySelectorAll('.reveal:not(.in)').forEach(function(el){io.observe(el);});}
    scan();
    new MutationObserver(scan).observe(document.body,{childList:true,subtree:true});
  }
  if(document.readyState!=='loading'){setup();}else{document.addEventListener('DOMContentLoaded',setup);}
})();
</script>
<script>
(function(){
  var ov,list=[],idx=0;
  function build(){
    ov=document.createElement('div'); ov.id='lb-ov';
    ov.style.cssText='position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;background:rgba(15,17,14,.93);backdrop-filter:blur(4px);';
    ov.innerHTML='<button id="lb-x" aria-label="Cerrar" style="position:absolute;top:16px;right:20px;font-size:32px;line-height:1;color:#fff;background:none;border:0;cursor:pointer;opacity:.85;">&times;</button><button id="lb-prev" aria-label="Anterior" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:44px;color:#fff;background:none;border:0;cursor:pointer;opacity:.8;padding:12px;">&#8249;</button><img id="lb-img" alt="" style="max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 24px 70px rgba(0,0,0,.55);" /><button id="lb-next" aria-label="Siguiente" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:44px;color:#fff;background:none;border:0;cursor:pointer;opacity:.8;padding:12px;">&#8250;</button><div id="lb-count" style="position:absolute;bottom:16px;left:0;right:0;text-align:center;color:rgba(255,255,255,.75);font-family:sans-serif;font-size:13px;"></div>';
    document.body.appendChild(ov);
  }
  function hi(s){ return (s||'').replace(/([?&])w=\d+/, '$1w=1600'); }
  function show(){ document.getElementById('lb-img').src=hi(list[idx]); var c=document.getElementById('lb-count'); c.textContent=list.length>1?(idx+1)+' / '+list.length:''; var p=document.getElementById('lb-prev'),n=document.getElementById('lb-next'); var multi=list.length>1; p.style.display=multi?'block':'none'; n.style.display=multi?'block':'none'; }
  function open(srcs,i){ if(!ov) build(); list=srcs; idx=i; ov.style.display='flex'; document.body.style.overflow='hidden'; show(); }
  function close(){ if(ov) ov.style.display='none'; document.body.style.overflow=''; }
  function go(d){ if(!list.length) return; idx=(idx+d+list.length)%list.length; show(); }
  document.addEventListener('click', function(e){
    var t=e.target;
    if(t&&t.classList&&t.classList.contains('lb-img')){
      var imgs=[].slice.call(document.querySelectorAll('img.lb-img'));
      var srcs=imgs.map(function(x){return x.getAttribute('src');});
      var i=imgs.indexOf(t); open(srcs, i<0?0:i); return;
    }
    if(!ov||ov.style.display==='none') return;
    if(t.id==='lb-ov'||t.id==='lb-x') close();
    else if(t.id==='lb-prev') go(-1);
    else if(t.id==='lb-next') go(1);
  });
  document.addEventListener('keydown', function(e){ if(!ov||ov.style.display==='none') return; if(e.key==='Escape') close(); else if(e.key==='ArrowLeft') go(-1); else if(e.key==='ArrowRight') go(1); });
})();
</script>
<script>
/* Carga el embebido de Instagram y lo procesa cuando React dibuja un reel. process() es idempotente. */
(function(){
  var s=document.createElement('script'); s.async=true; s.src='https://www.instagram.com/embed.js';
  document.body.appendChild(s);
  setInterval(function(){ try{ if(window.instgrm && window.instgrm.Embeds && document.querySelector('.instagram-media:not([data-instgrm-rendered])')) window.instgrm.Embeds.process(); }catch(e){} }, 1500);
})();
</script>
