<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TandilStay</title>
<meta name="description" content="Cabañas con alma serrana en Tandil. Buscá, compará y reservá tu refugio entre las sierras." />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
.ff-display{font-family:'Fraunces',serif}
.ff-body{font-family:'Hanken Grotesk',sans-serif}
@keyframes fadeSlide{0%{opacity:0;transform:translateY(6px)}12%{opacity:1}88%{opacity:1}100%{opacity:0;transform:translateY(-6px)}}
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.rise{animation:rise .7s cubic-bezier(.2,.7,.2,1) both}
body{margin:0}
.clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = "https://unzytiqqitdfkdnpcgyz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuenl0aXFxaXRkZmtkbnBjZ3l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njg4NjAsImV4cCI6MjA5NjQ0NDg2MH0.jdwNTU1WpjjadG2tyfvqf69YbkczL-CrSayHbPj70CM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const WHATSAPP = "5492494000000";
const wa = `https://wa.me/${WHATSAPP}`;
const C = { paper:"#F3EEE2", ink:"#2C2A24", moss:"#3E4F3F", sage:"#7C8F6F", clay:"#BE6A4A", sun:"#E2A94E" };
const PHRASES = ["Tandil es un lugar soñado","Donde el aire huele a sierra","Vení a desconectar entre cerros"];
const NAV = [
  { key:"home", label:"Hospedajes", e:"⛰️" },
  { key:"qhacer", label:"Actividades", e:"🧭" },
  { key:"gastro", label:"Gastronomía", e:"🍴" },
  { key:"conoce", label:"Conocé Tandil", e:"🌿" },
];
const IMG = (p) => (!p ? "https://images.unsplash.com/photo-1518780664697-55e3ad937233?auto=format&fit=crop&w=900&q=80" : (String(p).startsWith("http") ? p : `https://images.unsplash.com/${p}?auto=format&fit=crop&w=900&q=80`));
const money = (n) => "$" + Number(n||0).toLocaleString("es-AR");
const capRange = (r) => { const caps=(r.units||[]).map(u=>u.capacity).filter(Boolean); if(!caps.length) return r.capacity?("hasta "+r.capacity):""; const mn=Math.min(...caps),mx=Math.max(...caps); return mn===mx?("hasta "+mx):(mn+" a "+mx); };

const FACTS = [
  { e:"🧀", text:"El salame de Tandil tiene Denominación de Origen: el único del país con ese sello." },
  { e:"🪨", text:"Las sierras de Tandil están entre las más antiguas del planeta: más de 2.000 millones de años." },
  { e:"⛰️", text:"La Piedra Movediza original se desplomó en 1912; la actual es una réplica de 2007." },
  { e:"🚌", text:"Tandil está a menos de 4 horas de CABA, ideal para un finde largo." },
];

function Band({ text }) {
  return (
    <div className="w-full text-center" style={{ background: C.moss }}>
      <div className="max-w-6xl mx-auto px-5 py-3 flex items-center justify-center gap-2">
        <span style={{ color: C.sun }}>✦</span>
        <span className="ff-body text-sm tracking-wide text-white/90">{text}</span>
        <span style={{ color: C.sun }}>✦</span>
      </div>
    </div>
  );
}

function PreHeader() {
  const [i, setI] = useState(0);
  useEffect(() => { const t = setInterval(() => setI((p) => (p + 1) % PHRASES.length), 3800); return () => clearInterval(t); }, []);
  return (
    <div className="w-full text-center" style={{ background: C.moss }}>
      <div className="max-w-6xl mx-auto px-5 py-2 flex items-center justify-center gap-2 overflow-hidden">
        <span style={{ color: C.sun }}>✦</span>
        <span key={i} className="ff-body text-[13px] tracking-wide text-white/90" style={{ animation: "fadeSlide 3.8s ease-in-out" }}>{PHRASES[i]}</span>
        <span style={{ color: C.sun }}>✦</span>
      </div>
    </div>
  );
}

function Header({ view, go, onOpen }) {
  return (
    <header className="relative z-20" style={{ background: C.paper }}>
      <div className="max-w-6xl mx-auto px-5 sm:px-6 h-[68px] flex items-center justify-between">
        <button onClick={() => go("home")} className="flex items-center gap-2.5">
          <div className="w-10 h-10 rounded-2xl grid place-items-center" style={{ background: C.moss }}>
            <svg viewBox="0 0 24 24" className="w-5 h-5" fill="none" stroke={C.sun} strokeWidth="2" strokeLinejoin="round"><circle cx="17" cy="7" r="2.4" /><path d="M2 19 L9 9 L13 15 L16.5 11 L22 19 Z" /></svg>
          </div>
          <span className="ff-display text-xl tracking-tight" style={{ color: C.ink }}>TandilStay</span>
        </button>
        <nav className="hidden md:flex items-center gap-7 ff-body text-[15px]" style={{ color: C.ink }}>
          {NAV.map((n) => (
            <button key={n.key} onClick={() => go(n.key)} className="hover:opacity-60 transition relative">
              {n.label}
              {view === n.key && <span className="absolute -bottom-2 left-0 right-0 h-[2px] rounded-full" style={{ background: C.clay }} />}
            </button>
          ))}
        </nav>
        <div className="hidden md:flex items-center gap-3">
          <button onClick={() => go("owners")} className="ff-body text-[15px] hover:opacity-60" style={{ color: C.clay }}>Sumá tu alojamiento</button>
          <button onClick={() => go("contacto")} className="rounded-full px-4 py-2 ff-body text-sm font-semibold text-white" style={{ background: C.moss }}>💬 Contacto</button>
        </div>
        <button onClick={onOpen} className="md:hidden p-2 -mr-2 text-2xl leading-none" style={{ color: C.ink }} aria-label="Menú">☰</button>
      </div>
    </header>
  );
}

function MobileMenu({ open, go, onClose }) {
  if (!open) return null;
  const items = [...NAV, { key:"owners", label:"Sumá tu alojamiento", e:"♥" }, { key:"contacto", label:"Contacto", e:"💬" }];
  return (
    <div className="fixed inset-0 z-50 md:hidden">
      <div className="absolute inset-0 bg-black/30" onClick={onClose}></div>
      <div className="absolute top-0 right-0 h-full w-[82%] max-w-xs p-6 rise" style={{ background: C.paper }}>
        <div className="flex items-center justify-between mb-8">
          <span className="ff-display text-lg" style={{ color: C.ink }}>Menú</span>
          <button onClick={onClose} className="text-2xl leading-none" style={{ color: C.ink }}>✕</button>
        </div>
        <nav className="flex flex-col">
          {items.map((n) => (
            <button key={n.key} onClick={() => { go(n.key); onClose(); }} className="flex items-center gap-3 py-3.5 border-b ff-body text-lg text-left" style={{ color: n.key === "owners" ? C.clay : C.ink, borderColor: "rgba(0,0,0,0.08)" }}>
              <span>{n.e}</span>{n.label}
            </button>
          ))}
        </nav>
      </div>
    </div>
  );
}

function SearchCard({ guests, setGuests, onSearch }) {
  return (
    <div className="bg-white rounded-[26px] shadow-[0_20px_50px_-20px_rgba(62,79,63,0.45)] border border-black/5 p-2.5 flex flex-col sm:flex-row gap-1.5">
      <div className="flex-1 flex items-center gap-3 px-4 py-3"><span>📍</span><div><div className="ff-body text-[10px] uppercase tracking-widest text-stone-400 font-semibold">Destino</div><div className="ff-body text-sm" style={{ color: C.ink }}>Tandil, Buenos Aires</div></div></div>
      <div className="hidden sm:block w-px bg-stone-200 my-2.5"></div>
      <div className="flex-1 flex items-center gap-3 px-4 py-3"><span>📅</span><div><div className="ff-body text-[10px] uppercase tracking-widest text-stone-400 font-semibold">Fechas</div><div className="ff-body text-sm" style={{ color: C.ink }}>Elegí en cada alojamiento</div></div></div>
      <div className="hidden sm:block w-px bg-stone-200 my-2.5"></div>
      <div className="flex items-center gap-3 px-4 py-3"><span>👥</span><div><div className="ff-body text-[10px] uppercase tracking-widest text-stone-400 font-semibold">Huéspedes</div><select value={guests} onChange={e=>setGuests(e.target.value)} className="ff-body text-sm bg-transparent outline-none cursor-pointer" style={{ color: C.ink }}><option value="">Para todos</option><option value="2">1–2 personas</option><option value="4">3–4 personas</option><option value="6">5–6 personas</option><option value="8">7 o más</option></select></div></div>
      <button onClick={onSearch} className="rounded-[20px] px-6 py-3.5 flex items-center justify-center gap-2 ff-body font-semibold text-sm text-white" style={{ background: C.clay }}>🔍 Buscar</button>
    </div>
  );
}

function CabinCard({ c }) {
  const cover = c.banner || (c.photos && c.photos[0]);
  const tag = c.promo_text ? "Promo" : (c.pet_friendly ? "Pet friendly" : null);
  return (
    <a href={"cabana.html?slug=" + c.slug} className="rise group cursor-pointer block">
      <div className="relative aspect-[5/6] rounded-[26px] overflow-hidden">
        <img src={IMG(cover)} alt={c.name} className="w-full h-full object-cover group-hover:scale-105 transition duration-700" />
        <div className="absolute inset-0 bg-gradient-to-t from-black/45 via-transparent to-transparent"></div>
        {tag && <span className="absolute top-3.5 left-3.5 rounded-full px-3 py-1 ff-body text-[12px] font-semibold backdrop-blur" style={{ background: "rgba(255,255,255,0.85)", color: C.moss }}>{tag}</span>}
        <div className="absolute bottom-0 left-0 right-0 p-4 text-white">
          <h3 className="ff-display text-xl leading-tight">{c.name}</h3>
          <p className="ff-body text-sm text-white/80">{c.zone}{capRange(c) ? " · " + capRange(c) : ""}</p>
        </div>
      </div>
      <p className="ff-body text-sm mt-3" style={{ color: C.ink }}><span className="font-bold">desde {money(c.price)}</span><span className="text-stone-500"> / noche</span></p>
    </a>
  );
}

function Home({ cabins, loading }) {
  const [amen, setAmen] = useState([]);
  const [zona, setZona] = useState("");
  const [guests, setGuests] = useState("");
  const [maxPrice, setMaxPrice] = useState("");
  const [order, setOrder] = useState("");
  const AMEN = [["pet","🐾 Pet friendly"],["pileta","🏊 Pileta"],["parrilla","🔥 Parrilla"],["wifi","📶 WiFi"]];
  const zonas = [...new Set(cabins.map(c=>c.zone).filter(Boolean))].sort();
  const capOf = (c) => { const caps=(c.units||[]).map(u=>u.capacity).filter(Boolean); return caps.length?Math.max(...caps):(c.capacity||0); };
  const toggleAmen = (k) => setAmen(a => a.includes(k) ? a.filter(x=>x!==k) : [...a, k]);
  const match = (c) => {
    if (zona && c.zone !== zona) return false;
    if (guests && capOf(c) < parseInt(guests,10)) return false;
    if (maxPrice && (c.price||0) > parseInt(maxPrice,10)) return false;
    for (const k of amen) { if (k==="pet") { if(!c.pet_friendly) return false; } else if (!(c.amenities||[]).includes(k)) return false; }
    return true;
  };
  let show = cabins.filter(match);
  if (order==="asc") show = [...show].sort((a,b)=>(a.price||0)-(b.price||0));
  else if (order==="desc") show = [...show].sort((a,b)=>(b.price||0)-(a.price||0));
  const activeCount = amen.length + (zona?1:0) + (guests?1:0) + (maxPrice?1:0) + (order?1:0);
  const clear = () => { setAmen([]); setZona(""); setGuests(""); setMaxPrice(""); setOrder(""); };
  const onSearch = () => { const el=document.getElementById("aloj"); if(el) el.scrollIntoView({behavior:"smooth"}); };
  const selCls = "ff-body text-sm rounded-full border bg-white px-3.5 py-2 cursor-pointer";
  const selStyle = { borderColor:"rgba(62,79,63,0.25)", color:C.moss };
  return (
    <div>
      <section className="relative" style={{ background: C.paper }}>
        <div className="max-w-6xl mx-auto px-5 sm:px-6 pt-12 sm:pt-16 pb-16 text-center">
          <p className="ff-body text-[12px] uppercase tracking-[0.25em] font-semibold mb-4" style={{ color: C.sage }}>Sierras de Tandil · Buenos Aires</p>
          <h1 className="ff-display text-[44px] sm:text-7xl leading-[0.95]" style={{ color: C.ink }}>Respirá hondo,<br /><span className="italic" style={{ color: C.moss }}>llegaste a las sierras</span></h1>
          <p className="ff-body text-stone-500 max-w-md mx-auto mt-5 text-[15px] leading-relaxed">Cabañas con alma serrana para desconectar de verdad. Encontrá tu refugio entre cerros, silencio y cielo abierto.</p>
          <div className="max-w-3xl mx-auto mt-9"><SearchCard guests={guests} setGuests={setGuests} onSearch={onSearch} /></div>
          <div className="flex flex-wrap gap-2 mt-5 justify-center">
            {AMEN.map(([k, l]) => <button key={k} onClick={() => toggleAmen(k)} className="rounded-full px-4 py-2 ff-body text-sm border transition" style={amen.includes(k) ? { background: C.moss, color: "white", borderColor: C.moss } : { borderColor: "rgba(62,79,63,0.25)", color: C.moss }}>{l}</button>)}
          </div>
        </div>
      </section>
      <Band text="Elegí tu refugio entre las sierras" />
      <section id="aloj" className="pb-16" style={{ background: C.paper }}>
        <div className="max-w-6xl mx-auto px-5 sm:px-6 pt-10">
          <div className="mb-5"><h2 className="ff-display text-3xl" style={{ color: C.ink }}>Alojamientos elegidos</h2><p className="ff-body text-stone-500 text-[15px] mt-1">Una selección para empezar a soñar tu escapada.</p></div>
          <div className="flex flex-wrap items-center gap-2 mb-7">
            <select value={zona} onChange={e=>setZona(e.target.value)} className={selCls} style={selStyle}><option value="">📍 Toda la zona</option>{zonas.map(z=><option key={z} value={z}>{z}</option>)}</select>
            <select value={guests} onChange={e=>setGuests(e.target.value)} className={selCls} style={selStyle}><option value="">👥 Huéspedes</option><option value="2">1–2</option><option value="4">3–4</option><option value="6">5–6</option><option value="8">7+</option></select>
            <select value={maxPrice} onChange={e=>setMaxPrice(e.target.value)} className={selCls} style={selStyle}><option value="">💲 Precio</option><option value="80000">Hasta $80.000</option><option value="120000">Hasta $120.000</option><option value="180000">Hasta $180.000</option></select>
            <select value={order} onChange={e=>setOrder(e.target.value)} className={selCls} style={selStyle}><option value="">↕ Orden</option><option value="asc">Precio: menor a mayor</option><option value="desc">Precio: mayor a menor</option></select>
            {activeCount>0 && <button onClick={clear} className="ff-body text-sm rounded-full px-3.5 py-2 border" style={{borderColor:"rgba(190,106,74,0.45)", color:C.clay}}>Limpiar ✕</button>}
            <span className="ff-body text-sm text-stone-400 ml-auto">{show.length} {show.length===1?"lugar":"lugares"}</span>
          </div>
          {loading ? <p className="ff-body text-stone-500 py-10 text-center">Cargando alojamientos…</p>
          : cabins.length === 0 ? <p className="ff-body text-stone-500 py-10 text-center">Pronto vas a ver los alojamientos acá.</p>
          : show.length === 0 ? <p className="ff-body text-stone-500 py-10 text-center">No hay alojamientos con esos filtros. Probá aflojar alguno.</p>
          : <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">{show.map((c, i) => <CabinCard key={i} c={c} />)}</div>}
        </div>
      </section>
    </div>
  );
}

function PageTitle({ kicker, title, sub }) {
  return (
    <div style={{ background: C.moss }}>
      <div className="max-w-6xl mx-auto px-5 sm:px-6 py-12 sm:py-16 text-center">
        <p className="ff-body text-[12px] uppercase tracking-[0.25em] font-semibold mb-3" style={{ color: C.sun }}>{kicker}</p>
        <h1 className="ff-display text-4xl sm:text-5xl text-white leading-tight">{title}</h1>
        {sub && <p className="ff-body text-white/75 max-w-lg mx-auto mt-4">{sub}</p>}
      </div>
    </div>
  );
}

function ActivitiesPage({ acts, loading }) {
  return (
    <div>
      <PageTitle kicker="Paseos & aventura" title="Qué hacer en Tandil" sub="Cerros, agua, historia y aire puro. Estos son los imperdibles para tu estadía." />
      <section className="max-w-6xl mx-auto px-5 sm:px-6 py-12">
        {loading ? <p className="ff-body text-stone-500 text-center py-10">Cargando…</p>
        : acts.length === 0 ? <p className="ff-body text-stone-500 text-center py-10">Pronto vas a ver las actividades acá.</p>
        : <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">{acts.map((a, i) => (
            <a key={i} href={"actividad.html?slug=" + a.slug} className="rise rounded-[24px] overflow-hidden bg-white border border-black/5 block">
              <div className="aspect-[16/11] overflow-hidden bg-stone-200"><img src={IMG(a.banner || (a.photos && a.photos[0]))} alt={a.name} className="w-full h-full object-cover hover:scale-105 transition duration-700" /></div>
              <div className="p-5">{a.category && <span className="ff-body text-[11px] uppercase tracking-widest font-semibold" style={{ color: C.sage }}>{a.category}</span>}<h3 className="ff-display text-xl mt-0.5" style={{ color: C.ink }}>{a.name}</h3><p className="ff-body text-sm text-stone-500 mt-1.5 leading-relaxed clamp2">{a.blurb}</p>{a.duration && <p className="ff-body text-sm text-stone-400 mt-2">⏱ {a.duration}</p>}</div>
            </a>
          ))}</div>}
      </section>
    </div>
  );
}

function FoodPage({ food, loading }) {
  return (
    <div>
      <PageTitle kicker="Sabores serranos" title="Dónde comer en Tandil" sub="De las picadas con salame con Denominación de Origen a la cervecería artesanal: comé como un local." />
      <section className="max-w-6xl mx-auto px-5 sm:px-6 py-12">
        {loading ? <p className="ff-body text-stone-500 text-center py-10">Cargando…</p>
        : food.length === 0 ? <p className="ff-body text-stone-500 text-center py-10">Pronto vas a ver los lugares acá.</p>
        : <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">{food.map((a, i) => (
            <a key={i} href={"resto.html?slug=" + a.slug} className="rise rounded-[24px] overflow-hidden bg-white border border-black/5 block">
              <div className="aspect-[16/11] overflow-hidden bg-stone-200"><img src={IMG(a.banner || (a.photos && a.photos[0]))} alt={a.name} className="w-full h-full object-cover hover:scale-105 transition duration-700" /></div>
              <div className="p-5"><div className="flex gap-1.5 mb-1">{a.sin_tacc && <span className="ff-body text-[11px] rounded-full px-2 py-0.5" style={{ background:"#eef2e8", color:C.moss }}>Sin TACC</span>}{a.vegetariano && <span className="ff-body text-[11px] rounded-full px-2 py-0.5" style={{ background:"#eef2e8", color:C.moss }}>Veggie</span>}</div><h3 className="ff-display text-xl" style={{ color: C.ink }}>{a.name}</h3><p className="ff-body text-sm text-stone-500 mt-1.5 leading-relaxed clamp2">{a.blurb}</p></div>
            </a>
          ))}</div>}
      </section>
    </div>
  );
}

function AboutPage() {
  return (
    <div>
      <PageTitle kicker="La ciudad" title="Conocé Tandil" />
      <section className="max-w-4xl mx-auto px-5 sm:px-6 py-12">
        <div className="rounded-[26px] overflow-hidden mb-8"><img src={IMG("photo-1500534314209-a25ddb2bd429")} className="w-full aspect-[16/8] object-cover bg-stone-200" /></div>
        <p className="ff-body text-lg text-stone-600 leading-relaxed mb-4">Tandil es una ciudad serrana del centro de la provincia de Buenos Aires, rodeada de cerros milenarios, arroyos y aire limpio. Combina la calma del campo con la comodidad de una ciudad completa.</p>
        <p className="ff-body text-lg text-stone-600 leading-relaxed mb-10">Es famosa por sus embutidos y quesos artesanales, su turismo religioso en Semana Santa y sus paisajes de sierras suaves, perfectas para caminar, andar en bici o simplemente desconectar.</p>
        <h2 className="ff-display text-2xl mb-5" style={{ color: C.ink }}>✨ Datos curiosos</h2>
        <div className="grid sm:grid-cols-2 gap-4">{FACTS.map((f, i) => <div key={i} className="flex gap-3 bg-white border border-black/5 rounded-[20px] p-4"><span className="text-2xl">{f.e}</span><p className="ff-body text-sm text-stone-600 leading-relaxed">{f.text}</p></div>)}</div>
      </section>
    </div>
  );
}

function OwnersPage() {
  const benefits = [
    { t:"Tu propia landing", s:"Cada cabaña con su página, fotos, precios y calendario propio." },
    { t:"Reservas directas", s:"Las consultas te llegan por WhatsApp, sin intermediarios eternos." },
    { t:"Más visibilidad", s:"Aparecés ante todos los que buscan dónde quedarse en Tandil." },
  ];
  return (
    <div>
      <PageTitle kicker="Para anfitriones" title="Sumá tu alojamiento" sub="Mostrá tu cabaña ante miles de viajeros que buscan Tandil. Simple, sin comisiones abusivas." />
      <section className="max-w-5xl mx-auto px-5 sm:px-6 py-12">
        <div className="grid sm:grid-cols-3 gap-5 mb-10">{benefits.map((b, i) => <div key={i} className="rounded-[22px] p-6 bg-white border border-black/5"><div className="w-10 h-10 rounded-full grid place-items-center mb-3 text-white" style={{ background: C.sage }}>✓</div><h3 className="ff-display text-xl" style={{ color: C.ink }}>{b.t}</h3><p className="ff-body text-sm text-stone-500 mt-1.5 leading-relaxed">{b.s}</p></div>)}</div>
        <div className="rounded-[26px] p-8 text-center" style={{ background: C.moss }}>
          <h2 className="ff-display text-3xl text-white mb-3">¿Listos para empezar?</h2>
          <p className="ff-body text-white/75 max-w-md mx-auto mb-6">Escribinos y en minutos tu cabaña está publicada en TandilStay.</p>
          <a href={wa} target="_blank" rel="noreferrer" className="inline-block bg-white rounded-full px-7 py-3 ff-body font-semibold" style={{ color: C.moss }}>💬 Quiero sumarme</a>
        </div>
      </section>
    </div>
  );
}

function ContactPage() {
  return (
    <div>
      <PageTitle kicker="Hablemos" title="Contacto" sub="Estamos para ayudarte a encontrar tu lugar en las sierras." />
      <section className="max-w-3xl mx-auto px-5 sm:px-6 py-12">
        <div className="grid sm:grid-cols-3 gap-4 mb-8">
          {[{ e:"💬", t:"WhatsApp", s:"+54 9 249 ..." },{ e:"✉️", t:"Email", s:"hola@tandilstay.com" },{ e:"📷", t:"Instagram", s:"@tandilstay" }].map((x, i) => (
            <div key={i} className="rounded-[22px] p-6 bg-white border border-black/5 text-center"><div className="text-2xl">{x.e}</div><div className="ff-display text-lg mt-2" style={{ color: C.ink }}>{x.t}</div><div className="ff-body text-sm text-stone-500">{x.s}</div></div>
          ))}
        </div>
        <a href={wa} target="_blank" rel="noreferrer" className="block text-center w-full rounded-full py-4 ff-body font-semibold text-white" style={{ background: C.moss }}>💬 Escribinos por WhatsApp</a>
      </section>
    </div>
  );
}

function App() {
  const params = new URLSearchParams(location.search);
  const op = (params.get("op") || "").trim();
  const rubroParam = (params.get("rubro") || "").trim().toLowerCase();
  const TAB = { hospedaje: "home", actividad: "qhacer", gastronomia: "gastro" };
  const navedRef = React.useRef(false);
  const [menu, setMenu] = useState(false);
  const [view, setView] = useState(TAB[rubroParam] || "home");
  const [data, setData] = useState({ loading: true, missing: !op, cabins: [], acts: [], food: [], rubro: "hospedaje" });
  useEffect(() => {
    if (op) document.title = op + " · TandilStay";
    if (!op) { setData(d => ({ ...d, loading: false, missing: true })); return; }
    (async () => {
      const [a, b, c] = await Promise.all([
        db.from("cabins").select("*").order("created_at", { ascending: false }),
        db.from("activities").select("*").order("created_at", { ascending: false }),
        db.from("restaurants").select("*").order("created_at", { ascending: false }),
      ]);
      const allCabins = a.data || [], allActs = b.data || [], allFood = c.data || [];
      const mine = (x) => String(x.operator || "").trim().toLowerCase() === op.toLowerCase();
      const ownCabins = allCabins.filter(mine), ownActs = allActs.filter(mine), ownFood = allFood.filter(mine);
      // Rubro del operador: explícito por ?rubro=, si no se detecta por dónde tiene publicaciones, si no hospedaje.
      let rubro = rubroParam;
      if (!["hospedaje", "actividad", "gastronomia"].includes(rubro)) {
        if (ownCabins.length) rubro = "hospedaje";
        else if (ownActs.length) rubro = "actividad";
        else if (ownFood.length) rubro = "gastronomia";
        else rubro = "hospedaje";
      }
      // Solo el rubro propio se filtra al operador; los otros dos se traen de la home maestra.
      setData({
        loading: false, missing: false, rubro,
        cabins: rubro === "hospedaje" ? ownCabins : allCabins,
        acts:   rubro === "actividad" ? ownActs   : allActs,
        food:   rubro === "gastronomia" ? ownFood : allFood,
      });
      // Si no vino ?rubro= y la persona no tocó nada, abrimos en la pestaña del rubro propio.
      if (!navedRef.current && !rubroParam) setView(TAB[rubro] || "home");
    })();
  }, []);
  const go = (v) => { navedRef.current = true; setView(v); setMenu(false); window.scrollTo({ top: 0 }); };
  useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);

  if (data.missing) return (
    <div className="min-h-screen grid place-items-center ff-body p-6 text-center" style={{ background: C.paper, color: C.ink }}>
      Falta indicar el operador en la dirección (?op=...).
    </div>
  );

  return (
    <div className="min-h-screen ff-body" style={{ background: C.paper }}>
      <PreHeader />
      <Header view={view} go={go} onOpen={() => setMenu(true)} />
      <MobileMenu open={menu} go={go} onClose={() => setMenu(false)} />
      {view === "home" && <Home cabins={data.cabins} loading={data.loading} />}
      {view === "qhacer" && <ActivitiesPage acts={data.acts} loading={data.loading} />}
      {view === "gastro" && <FoodPage food={data.food} loading={data.loading} />}
      {view === "conoce" && <AboutPage />}
      {view === "owners" && <OwnersPage />}
      {view === "contacto" && <ContactPage />}
      <footer className="py-10 text-center ff-body text-sm" style={{ background: C.moss, color: "rgba(255,255,255,0.7)" }}>
        <div>TandilStay · hecho con calma en las sierras de Tandil</div>
        <div className="mt-1 text-white/50">Creado por Brote 🌱</div>
      </footer>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
