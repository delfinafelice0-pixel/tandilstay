}

function Home({ cabins, loading, go }) {
  const [zona, setZona] = useState("");
  const [guests, setGuests] = useState("");
  const [maxPrice, setMaxPrice] = useState("");
  const [order, setOrder] = useState("");
  const zonas = [...new Set(cabins.map(c=>c.zone).filter(Boolean))].sort();
  const capOf = (c) => { const caps=(c.units||[]).map(u=>u.capacity).filter(Boolean); return caps.length?Math.max(...caps):(c.capacity||0); };
  const match = (c) => {
    if (zona && c.zone !== zona) return false;
    if (guests && capOf(c) < parseInt(guests,10)) return false;
    if (maxPrice && (c.price||0) > parseInt(maxPrice,10)) return false;
    return true;
  };
  let show = cabins.filter(match);
  if (order==="asc") show = [...show].sort((a,b)=>(a.price||0)-(b.price||0));
  else if (order==="desc") show = [...show].sort((a,b)=>(b.price||0)-(a.price||0));
  const activeCount = (zona?1:0) + (guests?1:0) + (maxPrice?1:0) + (order?1:0);
  const clear = () => { setZona(""); setGuests(""); setMaxPrice(""); setOrder(""); };
  const goAloj = () => { const el=document.getElementById("aloj"); if(el) el.scrollIntoView({behavior:"smooth"}); };

  const selStyle = { borderColor:"rgba(36,34,28,0.18)", color:C.moss };

        <div className="relative z-10 max-w-6xl mx-auto w-full px-5 sm:px-6 pb-8 text-white">

          <p className="rise ff-body text-white/90 max-w-[44ch] mt-5 text-[16px] sm:text-[18px]" style={{ animationDelay:".1s" }}>Los lugares más lindos para dormir, comer y perderte entre las sierras — elegidos uno por uno.</p>
          <div className="rise flex flex-wrap items-center gap-x-7 gap-y-4 mt-7" style={{ animationDelay:".18s" }}>
            <button onClick={goAloj} className="inline-flex items-center gap-2.5 rounded-full px-7 py-[15px] ff-body font-semibold text-[15px] transition-transform duration-500 hover:-translate-y-0.5" style={{ background:C.cream, color:C.ink }}>Empezá a explorar</button>
            <a href="consulta.html" className="navlink ff-body text-[15px] text-white/90">¿No sabés cuál elegir? →</a>
          </div>
        </div>
      </section>

      {/* BUSCADOR */}
      <section className="px-5 sm:px-6 relative z-20 -mt-20 sm:-mt-16" style={{ background:"transparent" }}>
        <div className="reveal max-w-4xl mx-auto bg-white rounded-[26px] border border-black/5 p-2.5 flex flex-col sm:flex-row items-stretch gap-1" style={{ boxShadow:"0 36px 80px -44px rgba(62,79,63,0.6)" }}>
          <div className="flex-1 px-5 py-3">
            <div className="ff-body text-[10px] uppercase tracking-[0.22em] text-stone-400 font-semibold mb-1">Zona</div>
            <select value={zona} onChange={e=>setZona(e.target.value)} className="w-full ff-body text-[15px] bg-transparent outline-none cursor-pointer" style={{ color:C.ink }}><option value="">Toda la zona</option>{zonas.map(z=><option key={z} value={z}>{z}</option>)}</select>
          </div>
          <div className="hidden sm:block w-px bg-stone-200 my-3"></div>
          <div className="flex-1 px-5 py-3">
            <div className="ff-body text-[10px] uppercase tracking-[0.22em] text-stone-400 font-semibold mb-1">Huéspedes</div>
            <select value={guests} onChange={e=>setGuests(e.target.value)} className="w-full ff-body text-[15px] bg-transparent outline-none cursor-pointer" style={{ color:C.ink }}><option value="">Para todos</option><option value="2">1–2 personas</option><option value="4">3–4 personas</option><option value="6">5–6 personas</option><option value="8">7 o más</option></select>
          </div>
          <div className="hidden sm:block w-px bg-stone-200 my-3"></div>
          <div className="flex-1 px-5 py-3">
            <div className="ff-body text-[10px] uppercase tracking-[0.22em] text-stone-400 font-semibold mb-1">Precio</div>

      </section>

      {/* CATEGORÍAS */}

        </div>
        <div className="reveal flex flex-wrap items-center gap-2 mb-9">

        <a href="consulta.html" className="inline-flex items-center gap-2.5 rounded-full px-8 py-4 ff-body font-semibold text-[16px] mt-9 text-white transition-transform duration-500 hover:-translate-y-0.5" style={{ background: C.moss }}>Hacer una consulta →</a>

function PageTitle({ kicker, title, sub }) {

        <div className="mt-8 flex justify-center"><Horizon color={C.ink} /></div>
      </div>
    </div>
  );

function ActivitiesPage({ acts, loading }) {
  const [zona, setZona] = useState("");
  const [cat, setCat] = useState("");
  const zonas = [...new Set(acts.map(a=>a.zone).filter(Boolean))].sort();
  const cats = [...new Set(acts.map(a=>a.category).filter(Boolean))].sort();
  const show = acts.filter(a => (!zona || a.zone===zona) && (!cat || a.category===cat));

  const clear = () => { setZona(""); setCat(""); };
  const selCls = "ff-body text-[13px] rounded-full border bg-transparent px-4 py-2 cursor-pointer";
  const selStyle = { borderColor:"rgba(36,34,28,0.18)", color:C.moss };
  return (
    <div style={{ background: C.paper }}>
      <PageTitle kicker="Paseos & aventura" title="Qué hacer en Tandil" sub="Cerros, agua, historia y aire puro. Estos son los imperdibles para tu estadía." />

        {!loading && acts.length>0 && (
          <div className="reveal flex flex-wrap items-center gap-2 mb-9">
            <select value={cat} onChange={e=>setCat(e.target.value)} className={selCls} style={selStyle}><option value="">Todas las categorías</option>{cats.map(z=><option key={z} value={z}>{z}</option>)}</select>

        : acts.length === 0 ? <p className="ff-body text-stone-500 text-center py-10">Pronto vas a ver las actividades acá.</p>
        : show.length === 0 ? <p className="ff-body text-stone-500 text-center py-10">No hay actividades con esos filtros. Probá aflojar alguno.</p>
        : <div className="reveal grid sm:grid-cols-2 lg:grid-cols-3 gap-x-7 gap-y-10">{show.map((a, i) => (
            <a key={i} href={"actividad.html?slug=" + a.slug + opSuffix} className="group block">

        : show.length === 0 ? <p className="ff-body text-stone-500 text-center py-10">No hay lugares con esos filtros. Probá aflojar alguno.</p>

function App() {
  const [menu, setMenu] = useState(false);
  const [view, setView] = useState(new URLSearchParams(location.search).get("view") || "home");
  const [scrolled, setScrolled] = useState(false);
  const [data, setData] = useState({ loading: true, cabins: [], acts: [], food: [] });
  useEffect(() => {
    (async () => {
      const [a, b, c] = await Promise.all([
        db.from("cabins").select("*").order("created_at", { ascending: false }),
        db.from("activities").select("*").order("created_at", { ascending: false }),
        db.from("restaurants").select("*").order("created_at", { ascending: false }),
      ]);
      setData({ loading: false, cabins: a.data || [], acts: b.data || [], food: c.data || [] });
    })();
  }, []);
  const go = (v) => { setView(v); setMenu(false); window.scrollTo({ top: 0 }); };
  useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > window.innerHeight * 0.7);
    onScroll(); window.addEventListener("scroll", onScroll, { passive:true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  useEffect(() => {
    const els = Array.from(document.querySelectorAll(".reveal:not(.in)"));
    if (!("IntersectionObserver" in window)) { els.forEach(e => e.classList.add("in")); return; }
    const io = new IntersectionObserver((ents) => { ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } }); }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    els.forEach(e => io.observe(e));
    return () => io.disconnect();
  }, [view, data]);
  const solid = view !== "home" || scrolled;
  return (
    <div className="min-h-screen ff-body" style={{ background: C.paper }}>
      <Header view={view} go={go} onOpen={() => setMenu(true)} solid={solid} />
      <MobileMenu open={menu} go={go} onClose={() => setMenu(false)} />
      {view === "home" && <Home cabins={data.cabins} loading={data.loading} go={go} />}
      {view === "qhacer" && <ActivitiesPage acts={data.acts} loading={data.loading} />}
      {view === "gastro" && <FoodPage food={data.food} loading={data.loading} />}
      {view === "conoce" && <AboutPage />}
      {view === "owners" && <OwnersPage />}
      {view === "contacto" && <ContactPage />}
      <Footer go={go} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
