function LodgingPage({ cabins, loading }) {
  const [guests, setGuests] = useState("");
  const [maxPrice, setMaxPrice] = useState("");
  const [tipo, setTipo] = useState("");
  const [order, setOrder] = useState("");
  const [amen, setAmen] = useState([]);
  const [pet, setPet] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  const capOf = (c) => { const caps=(c.units||[]).map(u=>u.capacity).filter(Boolean); return caps.length?Math.max(...caps):(c.capacity||0); };
  const match = (c) => {
    if (guests && capOf(c) < parseInt(guests,10)) return false;
    if (maxPrice) { const p=(c.price||0); if (maxPrice.endsWith("+")) { if (p <= parseInt(maxPrice,10)) return false; } else if (p > parseInt(maxPrice,10)) return false; }
    if (tipo && c.type !== tipo) return false;
    if (amen.length && !amen.every(a=>(c.amenities||[]).includes(a))) return false;
    if (pet && !c.pet_friendly) return false;
    return true;
  };
  let show = cabins.filter(match);
  if (order==="asc") show = [...show].sort((a,b)=>(a.price||0)-(b.price||0));
  else if (order==="desc") show = [...show].sort((a,b)=>(b.price||0)-(a.price||0));
  const activeCount = (guests?1:0)+(maxPrice?1:0)+(tipo?1:0)+(order?1:0)+amen.length+(pet?1:0);
  const clear = () => { setGuests(""); setMaxPrice(""); setTipo(""); setOrder(""); setAmen([]); setPet(false); };

  return (
    <div style={{ background: C.paper }}>

              <select value={maxPrice} onChange={e=>setMaxPrice(e.target.value)} className={selCls} style={selStyle}><option value="">Cualquier precio</option><option value="120000">Hasta $120.000</option><option value="250000">Hasta $250.000</option><option value="250000+">Más de $250.000</option></select>
              <select value={tipo} onChange={e=>setTipo(e.target.value)} className={selCls} style={selStyle}><option value="">Todos los tipos</option>{TYPES.map(t=><option key={t} value={t}>{t}</option>)}</select>
              <select value={order} onChange={e=>setOrder(e.target.value)} className={selCls} style={selStyle}><option value="">Ordenar</option><option value="asc">Precio: menor a mayor</option><option value="desc">Precio: mayor a menor</option></select>
              <button onClick={()=>setMoreOpen(o=>!o)} className={selCls} style={selStyle}>Comodidades{amen.length?(" ("+amen.length+")"):""} {moreOpen?"▲":"▼"}</button>
              <button onClick={()=>setPet(p=>!p)} className={selCls} style={pet?{borderColor:C.moss,background:C.moss,color:"#fff"}:selStyle}>🐾 Pet friendly{pet?" ✓":""}</button>
              {activeCount>0 && <button onClick={clear} className="ff-body text-[13px] rounded-full px-4 py-2 border" style={{ borderColor:"rgba(190,106,74,0.4)", color:C.clay }}>Limpiar filtros ✕</button>}

function App() {
  const [menu, setMenu] = useState(false);
  const [view, setView] = useState(new URLSearchParams(location.search).get("view") || "home");
  const [scrolled, setScrolled] = useState(false);
  const [data, setData] = useState({ loading: true, cabins: [], acts: [], food: [] });
  useEffect(() => {
    (async () => {
      const [a, b, c] = await Promise.all([
        db.from("cabins").select("*").order("created_at", { ascending: false }),
        db.from("activities").select("*").order("created_at", { ascending: false }),
        db.from("restaurants").select("*").order("created_at", { ascending: false }),
      ]);
      setData({ loading: false, cabins: a.data || [], acts: b.data || [], food: c.data || [] });
    })();
  }, []);
  const go = (v) => { setView(v); setMenu(false); window.scrollTo({ top: 0 }); };
  useEffect(() => { window.scrollTo({ top: 0 }); }, [view]);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > window.innerHeight * 0.7);
    onScroll(); window.addEventListener("scroll", onScroll, { passive:true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  useEffect(() => {
    const els = Array.from(document.querySelectorAll(".reveal:not(.in)"));
    if (!("IntersectionObserver" in window)) { els.forEach(e => e.classList.add("in")); return; }
    const io = new IntersectionObserver((ents) => { ents.forEach(e => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } }); }, { threshold: 0.12, rootMargin: "0px 0px -6% 0px" });
    els.forEach(e => io.observe(e));
    return () => io.disconnect();
  }, [view, data]);
  const solid = view !== "home" || scrolled;
  return (
    <div className="min-h-screen ff-body" style={{ background: C.paper }}>
      <Header view={view} go={go} onOpen={() => setMenu(true)} solid={solid} />
      <MobileMenu open={menu} go={go} onClose={() => setMenu(false)} />
      {view === "home" && <Home cabins={data.cabins} acts={data.acts} food={data.food} loading={data.loading} go={go} />}
      {view === "aloj" && <LodgingPage cabins={data.cabins} loading={data.loading} />}
      {view === "qhacer" && <ActivitiesPage acts={data.acts} loading={data.loading} />}
      {view === "gastro" && <FoodPage food={data.food} loading={data.loading} />}
      {view === "conoce" && <AboutPage />}
      {view === "owners" && <OwnersPage />}
      {view === "contacto" && <ContactPage />}
      <Footer go={go} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
