<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carta · Visitando Tandil</title>
<meta name="description" content="La carta de este lugar en Tandil. Mirá los platos y pedí por WhatsApp." />
<link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%2024%2024%27%3E%3Crect%20width%3D%2724%27%20height%3D%2724%27%20rx%3D%276%27%20fill%3D%27%233E4F3F%27/%3E%3Ccircle%20cx%3D%2717%27%20cy%3D%277.5%27%20r%3D%272.2%27%20fill%3D%27%23E2A94E%27/%3E%3Cpath%20d%3D%27M3%2018%20L8.5%209%20L12%2013.5%20L15%2010%20L21%2018%20Z%27%20fill%3D%27none%27%20stroke%3D%27%23E2A94E%27%20stroke-width%3D%271.8%27%20stroke-linejoin%3D%27round%27/%3E%3C/svg%3E" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="Visitando Tandil" />
<meta property="og:locale" content="es_AR" />
<meta property="og:title" content="Carta · Visitando Tandil" />
<meta property="og:description" content="La carta de este lugar en Tandil. Mirá los platos y pedí por WhatsApp." />
<meta property="og:url" content="https://delfinafelice0-pixel.github.io/tandilstay/menu.html" />
<meta property="og:image" content="https://delfinafelice0-pixel.github.io/tandilstay/og.png?v=3" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:image:alt" content="Visitando Tandil" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Carta · Visitando Tandil" />
<meta name="twitter:description" content="La carta de este lugar en Tandil. Mirá los platos y pedí por WhatsApp." />
<meta name="twitter:image" content="https://delfinafelice0-pixel.github.io/tandilstay/og.png?v=3" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Hanken+Grotesk:wght@400;500;600;700&display=swap');
.ff-display{font-family:'Fraunces',serif}.ff-body{font-family:'Hanken Grotesk',sans-serif}body{margin:0}
.no-scrollbar::-webkit-scrollbar{display:none}.no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SUPABASE_URL = "https://unzytiqqitdfkdnpcgyz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVuenl0aXFxaXRkZmtkbnBjZ3l6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA4Njg4NjAsImV4cCI6MjA5NjQ0NDg2MH0.jdwNTU1WpjjadG2tyfvqf69YbkczL-CrSayHbPj70CM";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const C = { paper:"#F3EEE2", cream:"#FBF7EF", mist:"#E7E1D3", ink:"#2C2A24", moss:"#3E4F3F", sage:"#7C8F6F", clay:"#BE6A4A", sun:"#E2A94E" };
const IMG = (p) => (!p ? "" : (String(p).startsWith("http") ? p : `https://images.unsplash.com/${p}?auto=format&fit=crop&w=1200&q=80`));
const money = (n) => "$" + Number(n||0).toLocaleString("es-AR");
const fromRow = (r) => ({ id:r.id, slug:r.slug, name:r.name, zone:r.zone||"", whatsapp:r.whatsapp||"", phone:r.phone||"", blurb:r.blurb||"", sinTacc:r.sin_tacc, vegetariano:r.vegetariano, menu:r.menu||[], banner:r.banner||"", photos:r.photos||[] });
const slugId = (s) => "cat-" + String(s).replace(/[^a-zA-Z0-9]+/g,"-");

function DishCard({ it, qty, onAdd, onDec }) {
  const initial = (it.name||"·").trim().charAt(0).toUpperCase();
  return (
    <div className="bg-white border border-black/5 rounded-2xl overflow-hidden flex flex-col">
      <div className="aspect-[5/4] w-full overflow-hidden relative" style={{background:"linear-gradient(135deg,"+C.mist+",#d7d1c0)"}}>
        {it.photo
          ? <img src={IMG(it.photo)} alt={it.name} className="w-full h-full object-cover" />
          : <div className="w-full h-full grid place-items-center"><span className="ff-display" style={{fontSize:"40px",color:"rgba(62,79,63,0.35)"}}>{initial}</span></div>}
        {qty>0 && <span className="absolute top-2 right-2 min-w-[24px] h-6 px-1.5 rounded-full grid place-items-center ff-body text-[12px] font-bold text-white" style={{background:C.clay}}>{qty}</span>}
      </div>
      <div className="p-3 flex-1 flex flex-col">
        <h3 className="ff-display text-[16px] leading-tight" style={{color:C.ink}}>{it.name}</h3>
        {it.desc && <p className="ff-body text-[12.5px] text-stone-500 mt-1 leading-snug clamp2">{it.desc}</p>}
        <div className="mt-auto pt-3 flex items-center justify-between gap-2">
          {it.price>0
            ? <span className="ff-display text-[15px]" style={{color:C.ink}}>{money(it.price)}</span>
            : <span className="ff-body text-[12px] text-stone-400">Consultar</span>}
          {onAdd && (qty>0
            ? <div className="flex items-center gap-1.5 shrink-0">
                <button onClick={onDec} aria-label="Quitar uno" className="w-7 h-7 rounded-full grid place-items-center text-white text-lg leading-none" style={{background:C.sage}}>−</button>
                <span className="ff-body text-sm font-bold text-center" style={{color:C.ink, minWidth:"16px"}}>{qty}</span>
                <button onClick={onAdd} aria-label="Agregar uno" className="w-7 h-7 rounded-full grid place-items-center text-white text-lg leading-none" style={{background:C.moss}}>+</button>
              </div>
            : <button onClick={onAdd} aria-label={"Agregar "+it.name} className="shrink-0 w-8 h-8 rounded-full grid place-items-center text-white text-xl leading-none" style={{background:C.moss}}>+</button>)}
        </div>
      </div>
    </div>
  );
}

function Menu({ c }) {
  const cats = [...new Set(c.menu.map(i=>i.category||"Menú"))];
  const [active, setActive] = useState(cats[0]||"");
  const [cart, setCart] = useState({});   // índice del plato -> cantidad
  const [notes, setNotes] = useState({});  // índice del plato -> aclaración
  const [name, setName] = useState("");
  const [addr, setAddr] = useState("");
  const [sheet, setSheet] = useState(false);
  const cartOn = !!c.whatsapp;
  const wa = c.whatsapp ? `https://wa.me/${c.whatsapp}?text=`+encodeURIComponent(`Hola! Quiero hacer una consulta sobre ${c.name}.`) : null;
  const tags = [c.sinTacc && "Sin TACC", c.vegetariano && "Opciones veggie"].filter(Boolean);
  const go = (cat) => { setActive(cat); const el=document.getElementById(slugId(cat)); if(el){ const y=el.getBoundingClientRect().top+window.scrollY-92; window.scrollTo({top:y,behavior:"smooth"}); } };
  const hasBanner = !!c.banner;

  const add = (idx) => setCart(p => ({ ...p, [idx]: (p[idx]||0)+1 }));
  const dec = (idx) => setCart(p => { const q=(p[idx]||0)-1; const n={...p}; if(q<=0) delete n[idx]; else n[idx]=q; return n; });
  const setNote = (idx, v) => setNotes(p => ({ ...p, [idx]: v }));
  const entries = Object.entries(cart).map(([k,q]) => [Number(k), q]).filter(([i,q]) => q>0 && c.menu[i]);
  const count = entries.reduce((s,[,q]) => s+q, 0);
  const total = entries.reduce((s,[i,q]) => s + ((c.menu[i].price>0 ? c.menu[i].price : 0) * q), 0);
  const orderUrl = (() => {
    if (!c.whatsapp || count===0) return null;
    const lines = entries.map(([i,q]) => { const it=c.menu[i]; const nt=(notes[i]||"").trim(); return `• ${q}x ${it.name}` + (it.price>0 ? ` — ${money(it.price*q)}` : " — (a confirmar)") + (nt ? `\n   ↳ ${nt}` : ""); });
    let msg = `Hola!`;
    if (name.trim()) msg += ` Soy ${name.trim()}.`;
    msg += ` Quiero hacer este pedido en ${c.name}:\n\n${lines.join("\n")}\n\nTotal estimado: ${money(total)}`;
    if (addr.trim()) msg += `\n\nDirección de entrega: ${addr.trim()}`;
    return `https://wa.me/${c.whatsapp}?text=`+encodeURIComponent(msg);
  })();

  return (
    <div className="ff-body" style={{background:C.paper, minHeight:"100vh"}}>

      {/* HERO premium */}
      <header className="relative flex flex-col" style={{minHeight: hasBanner ? "60vh" : "auto"}}>
        {hasBanner && <div className="absolute inset-0 overflow-hidden">
          <img src={IMG(c.banner)} className="w-full h-full object-cover" />
          <div className="absolute inset-0" style={{background:"linear-gradient(180deg, rgba(28,27,23,.30) 0%, rgba(28,27,23,.20) 40%, rgba(28,27,23,.86) 100%)"}} />
        </div>}
        <div className="relative max-w-2xl mx-auto w-full px-5 pt-5">
          <a href={"resto.html?slug="+c.slug} className={"ff-body text-[13px] font-semibold "+(hasBanner?"text-white/85":"text-stone-400")}>‹ Volver a {c.name}</a>
        </div>
        <div className={"relative max-w-2xl mx-auto w-full px-5 pb-7 "+(hasBanner?"pt-28 mt-auto":"pt-8")}>
          <div className="ff-body text-[11px] uppercase tracking-[0.3em] font-semibold mb-2" style={{color:hasBanner?"#F0D9A8":C.clay}}>Nuestra carta</div>
          <h1 className="ff-display text-4xl sm:text-5xl leading-[1.05]" style={{color:hasBanner?"#fff":C.ink}}>{c.name}</h1>
          {c.zone && <p className={"ff-body text-sm mt-2 "+(hasBanner?"text-white/85":"text-stone-500")}>📍 {c.zone}</p>}
          {tags.length>0 && <div className="flex flex-wrap gap-2 mt-4">{tags.map((t,i)=><span key={i} className="rounded-full px-3 py-1 ff-body text-xs font-semibold" style={{background:hasBanner?"rgba(255,255,255,.94)":"#fff",color:C.moss}}>{t}</span>)}</div>}
          {wa && <a href={wa} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 rounded-full mt-6 px-6 py-3 ff-body font-semibold text-[15px]" style={hasBanner?{background:"#fff",color:C.moss}:{background:C.clay,color:"#fff"}}>💬 Consultar por WhatsApp</a>}
        </div>
      </header>

      {/* CHIPS de categoría */}
      {cats.length>1 && (
        <div className="sticky top-0 z-20 border-b border-black/5" style={{background:"rgba(243,238,226,.93)", backdropFilter:"blur(8px)", WebkitBackdropFilter:"blur(8px)"}}>
          <div className="max-w-2xl mx-auto px-3 flex gap-1.5 overflow-x-auto py-2.5 no-scrollbar">
            {cats.map((cat,i)=><button key={i} onClick={()=>go(cat)} className="rounded-full px-4 py-1.5 ff-body text-sm whitespace-nowrap transition border" style={active===cat?{background:C.moss,color:"#fff",borderColor:C.moss}:{color:C.moss,borderColor:"rgba(62,79,63,0.22)"}}>{cat}</button>)}
          </div>
        </div>
      )}

      {/* CARTA en tarjetas */}
      <main className="max-w-2xl mx-auto px-4 sm:px-6 py-8" style={{paddingBottom: count>0 ? "120px" : "32px"}}>
        {c.menu.length===0 ? <p className="ff-body text-stone-500 text-center py-16">La carta todavía no está cargada.</p> :
          cats.map((cat,ci)=>(
            <section key={ci} id={slugId(cat)} className="mb-9" style={{scrollMarginTop:"96px"}}>
              <h2 className="ff-display text-2xl mb-1" style={{color:C.ink}}>{cat}</h2>
              <div className="h-px w-12 mb-5" style={{background:C.clay}} />
              <div className="grid grid-cols-2 gap-3">
                {c.menu.map((it,idx)=>({it,idx})).filter(x=>(x.it.category||"Menú")===cat).map(({it,idx})=>(
                  <DishCard key={idx} it={it} qty={cart[idx]||0} onAdd={cartOn?(()=>add(idx)):null} onDec={cartOn?(()=>dec(idx)):null} />
                ))}
              </div>
            </section>
          ))
        }
      </main>

      {/* enlace de consulta al pie */}
      {wa && (
        <div className="max-w-2xl mx-auto px-4 sm:px-6 pb-8 text-center">
          <a href={wa} target="_blank" rel="noreferrer" className="ff-body text-sm font-semibold" style={{color:C.clay}}>¿Dudas? Consultá por WhatsApp →</a>
        </div>
      )}
      <footer className="py-8 text-center ff-body text-sm" style={{background:C.moss,color:"rgba(255,255,255,0.7)"}}>{c.name} · carta vía Visitando Tandil · Brote 🌱</footer>

      {/* BARRA FIJA DEL PEDIDO */}
      {cartOn && count>0 && !sheet && (
        <div className="fixed bottom-0 left-0 right-0 z-30 px-4 pb-4 pt-3" style={{background:"linear-gradient(transparent, rgba(243,238,226,.95) 32%)"}}>
          <div className="max-w-2xl mx-auto">
            <button onClick={()=>setSheet(true)} className="w-full flex items-center justify-between rounded-2xl px-5 py-4 text-white shadow-lg" style={{background:C.moss}}>
              <span className="flex items-center gap-2.5 ff-body font-semibold">
                <span className="min-w-[26px] h-[26px] px-1.5 rounded-full grid place-items-center text-[13px] font-bold" style={{background:"#fff",color:C.moss}}>{count}</span>
                Ver mi pedido
              </span>
              <span className="ff-display text-[17px]">{money(total)}</span>
            </button>
          </div>
        </div>
      )}

      {/* HOJA DEL PEDIDO */}
      {cartOn && sheet && (
        <div className="fixed inset-0 z-40 flex items-end justify-center" style={{background:"rgba(28,27,23,.5)"}} onClick={()=>setSheet(false)}>
          <div onClick={e=>e.stopPropagation()} className="w-full max-w-2xl rounded-t-3xl flex flex-col" style={{background:C.paper, maxHeight:"86vh"}}>
            <div className="flex items-center justify-between px-5 pt-5 pb-3">
              <h3 className="ff-display text-2xl" style={{color:C.ink}}>Tu pedido</h3>
              <button onClick={()=>setSheet(false)} aria-label="Cerrar" className="text-stone-400 hover:text-stone-700 text-2xl leading-none">✕</button>
            </div>
            <div className="flex-1 overflow-y-auto px-5 no-scrollbar">
              {entries.length===0 ? <p className="ff-body text-stone-500 text-center py-10">Tu pedido está vacío.</p> :
                entries.map(([i,q])=>{ const it=c.menu[i]; return (
                  <div key={i} className="py-3 border-b border-black/5">
                    <div className="flex items-center gap-3">
                      <div className="w-12 h-12 rounded-lg overflow-hidden shrink-0" style={{background:"linear-gradient(135deg,"+C.mist+",#d7d1c0)"}}>
                        {it.photo
                          ? <img src={IMG(it.photo)} alt={it.name} className="w-full h-full object-cover" />
                          : <div className="w-full h-full grid place-items-center ff-display" style={{color:"rgba(62,79,63,0.4)", fontSize:"20px"}}>{(it.name||"·").trim().charAt(0).toUpperCase()}</div>}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="ff-body font-semibold text-[15px] truncate" style={{color:C.ink}}>{it.name}</div>
                        <div className="ff-body text-[13px] text-stone-500">{it.price>0 ? money(it.price)+" c/u" : "A confirmar"}</div>
                      </div>
                      <div className="flex items-center gap-2 shrink-0">
                        <button onClick={()=>dec(i)} aria-label="Quitar uno" className="w-7 h-7 rounded-full grid place-items-center text-white text-lg leading-none" style={{background:C.sage}}>−</button>
                        <span className="ff-body text-sm font-bold text-center" style={{minWidth:"18px"}}>{q}</span>
                        <button onClick={()=>add(i)} aria-label="Agregar uno" className="w-7 h-7 rounded-full grid place-items-center text-white text-lg leading-none" style={{background:C.moss}}>+</button>
                      </div>
                      {it.price>0 && <div className="ff-display text-[15px] text-right shrink-0" style={{color:C.ink, minWidth:"72px"}}>{money(it.price*q)}</div>}
                    </div>
                    <input value={notes[i]||""} onChange={e=>setNote(i, e.target.value)} placeholder="Aclaración (ej: sin sal, para llevar)" className="w-full mt-2 ff-body text-[13px] rounded-lg px-3 py-2 outline-none" style={{background:"#fff", border:"1px solid rgba(0,0,0,.08)", color:C.ink}} />
                  </div>
                ); })
              }
            </div>
            <div className="px-5 pt-4 pb-6" style={{borderTop:"1px solid rgba(0,0,0,.06)"}}>
              {entries.length>0 && (
                <div className="space-y-2 mb-4">
                  <input value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre" className="w-full ff-body text-[14px] rounded-xl px-3.5 py-3 outline-none" style={{background:"#fff", border:"1px solid rgba(0,0,0,.08)", color:C.ink}} />
                  <input value={addr} onChange={e=>setAddr(e.target.value)} placeholder="Dirección de entrega (o 'retiro en el local')" className="w-full ff-body text-[14px] rounded-xl px-3.5 py-3 outline-none" style={{background:"#fff", border:"1px solid rgba(0,0,0,.08)", color:C.ink}} />
                </div>
              )}
              <div className="flex justify-between items-baseline mb-4">
                <span className="ff-body font-semibold" style={{color:C.ink}}>Total estimado</span>
                <span className="ff-display text-2xl" style={{color:C.ink}}>{money(total)}</span>
              </div>
              {orderUrl
                ? <a href={orderUrl} target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 rounded-full py-4 ff-body font-semibold text-white" style={{background:C.clay}}>💬 Enviar pedido por WhatsApp</a>
                : <div className="text-center ff-body text-sm text-stone-500 py-3">Agregá algún plato para enviar el pedido.</div>}
              {entries.length>0 && <button onClick={()=>{ setCart({}); setNotes({}); }} className="w-full text-center mt-3 ff-body text-sm text-stone-400">Vaciar pedido</button>}
              <p className="ff-body text-[12px] text-stone-400 text-center mt-3 leading-snug">El total es estimado. El local te confirma disponibilidad, formas de pago y envío por WhatsApp.</p>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App(){
  const [state,setState]=useState({loading:true});
  useEffect(()=>{ (async()=>{
    const slug=new URLSearchParams(location.search).get("slug");
    if(!slug){ setState({notfound:true}); return; }
    const {data,error}=await db.from("restaurants").select("*").eq("slug",slug).limit(1);
    if(error){ setState({error:true}); return; }
    if(data&&data[0]){ document.title="Carta · "+data[0].name; setState({c:fromRow(data[0])}); } else setState({notfound:true});
  })(); },[]);
  const center = (txt) => <div className="ff-body" style={{minHeight:"100vh",background:C.paper,color:C.ink,display:"grid",placeItems:"center",padding:"24px",textAlign:"center"}}>{txt}</div>;
  if(state.loading) return center("Cargando carta…");
  if(state.notfound||state.error) return center("No encontramos esta carta.");
  return <Menu c={state.c} />;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
